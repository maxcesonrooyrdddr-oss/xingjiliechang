<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>星际猎场 - 小说阅读器</title>
    <style>
        :root {
            --bg-color: #f5f5f5; --text-color: #333; --sidebar-bg: #fff;
            --header-bg: #fff; --border-color: #e0e0e0; --accent-color: #1a73e8;
            --hover-bg: #f0f0f0; --font-size: 18px; --line-height: 1.8;
        }
        [data-theme="dark"] { --bg-color: #1a1a1a; --text-color: #e0e0e0; --sidebar-bg: #2d2d2d; --header-bg: #2d2d2d; --border-color: #444; --hover-bg: #3d3d3d; }
        [data-theme="sepia"] { --bg-color: #f4ecd8; --text-color: #5b4636; --sidebar-bg: #e8dcc0; --header-bg: #e8dcc0; --border-color: #d4c4a8; --hover-bg: #ddd0b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg-color); color: var(--text-color); line-height: var(--line-height); overflow: hidden; }
        #app { display: flex; height: 100vh; }
        .sidebar { width: 300px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; transition: transform 0.3s ease; }
        .sidebar.hidden { transform: translateX(-100%); position: absolute; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border-color); background: linear-gradient(135deg, var(--accent-color), #4285f4); color: white; }
        .sidebar-header h1 { font-size: 1.5em; margin-bottom: 10px; }
        .stats { display: flex; gap: 15px; font-size: 0.85em; opacity: 0.9; }
        .chapter-list-container { flex: 1; overflow-y: auto; padding: 10px 0; }
        .chapter-list { list-style: none; }
        .chapter-item { padding: 12px 20px; cursor: pointer; border-left: 3px solid transparent; transition: all 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .chapter-item:hover { background: var(--hover-bg); border-left-color: var(--accent-color); }
        .chapter-item.active { background: var(--hover-bg); border-left-color: var(--accent-color); font-weight: 500; }
        .chapter-item.loading { opacity: 0.5; }
        .chapter-num { font-size: 0.9em; color: var(--accent-color); min-width: 50px; }
        .chapter-title { flex: 1; margin-left: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .chapter-wordcount { font-size: 0.75em; color: #999; margin-left: 10px; }
        .sidebar-footer { padding: 15px; border-top: 1px solid var(--border-color); }
        .btn-refresh { width: 100%; padding: 10px; border: none; border-radius: 6px; background: var(--accent-color); color: white; cursor: pointer; font-size: 0.9em; transition: opacity 0.2s; }
        .btn-refresh:hover { opacity: 0.9; }
        .btn-refresh:disabled { opacity: 0.5; cursor: not-allowed; }
        .reader-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .reader-header { height: 60px; background: var(--header-bg); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .btn-toggle-sidebar { width: 40px; height: 40px; border: none; background: transparent; font-size: 1.2em; cursor: pointer; color: var(--text-color); border-radius: 6px; }
        .btn-toggle-sidebar:hover { background: var(--hover-bg); }
        .reader-header h2 { flex: 1; text-align: center; font-size: 1.1em; font-weight: 500; padding: 0 20px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .reader-tools { display: flex; gap: 8px; }
        .tool-btn { width: 36px; height: 36px; border: 1px solid var(--border-color); background: transparent; border-radius: 6px; cursor: pointer; font-size: 0.9em; color: var(--text-color); }
        .tool-btn:hover { background: var(--hover-bg); }
        .chapter-content { flex: 1; overflow-y: auto; padding: 40px 60px; font-size: var(--font-size); line-height: var(--line-height); }
        .chapter-content h1 { font-size: 1.8em; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 2px solid var(--accent-color); }
        .chapter-content h2 { font-size: 1.4em; margin: 30px 0 15px; color: var(--accent-color); }
        .chapter-content h3 { font-size: 1.2em; margin: 25px 0 12px; }
        .chapter-content p { margin-bottom: 1.5em; text-indent: 2em; text-align: justify; }
        .chapter-content p:first-of-type { text-indent: 0; }
        .chapter-content strong { color: var(--accent-color); }
        .chapter-content hr { margin: 30px 0; border: none; border-top: 1px solid var(--border-color); }
        .loading { text-align: center; padding: 100px 0; color: #999; }
        .loading-spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid var(--border-color); border-top-color: var(--accent-color); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error { text-align: center; padding: 100px 0; color: #e74c3c; }
        .reader-footer { height: 60px; background: var(--header-bg); border-top: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }
        .nav-btn { padding: 10px 25px; border: 1px solid var(--border-color); background: transparent; border-radius: 6px; cursor: pointer; font-size: 0.95em; color: var(--text-color); transition: all 0.2s; }
        .nav-btn:hover:not(:disabled) { background: var(--accent-color); color: white; border-color: var(--accent-color); }
        .nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .progress-info { font-size: 0.9em; color: #666; }
        .progress-info .divider { margin: 0 8px; color: #ccc; }
        .last-updated { font-size: 0.8em; color: #999; margin-top: 5px; }
        @media (max-width: 768px) { .sidebar { position: absolute; width: 280px; } .chapter-content { padding: 20px 30px; } .reader-footer { padding: 0 20px; } .nav-btn { padding: 8px 15px; font-size: 0.85em; } }
        ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; } ::-webkit-scrollbar-thumb:hover { background: #aaa; }
    </style>
</head>
<body data-theme="light">
    <div id="app">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>📖 星际猎场</h1>
                <div class="stats">
                    <span id="total-chapters">加载中...</span>
                </div>
            </div>
            <div class="chapter-list-container">
                <ul class="chapter-list" id="chapter-list"></ul>
            </div>
            <div class="sidebar-footer">
                <button class="btn-refresh" id="btn-refresh" onclick="refreshChapters()">🔄 刷新章节</button>
                <div class="last-updated" id="last-updated"></div>
            </div>
        </aside>

        <main class="reader-main">
            <header class="reader-header">
                <button class="btn-toggle-sidebar" onclick="toggleSidebar()">☰</button>
                <h2 id="current-title">星际猎场</h2>
                <div class="reader-tools">
                    <button class="tool-btn" onclick="adjustFontSize(-1)">A-</button>
                    <button class="tool-btn" onclick="adjustFontSize(1)">A+</button>
                    <button class="tool-btn" onclick="toggleTheme()">🌙</button>
                </div>
            </header>

            <article class="chapter-content" id="chapter-content">
                <div class="loading"><div class="loading-spinner"></div><br>正在加载章节列表...</div>
            </article>

            <footer class="reader-footer">
                <button class="nav-btn" id="btn-prev" onclick="prevChapter()" disabled>← 上一章</button>
                <div class="progress-info">
                    <span id="current-chapter-num">第0章</span>
                    <span class="divider">/</span>
                    <span id="total-chapter-count">共0章</span>
                </div>
                <button class="nav-btn" id="btn-next" onclick="nextChapter()" disabled>下一章 →</button>
            </footer>
        </main>
    </div>

    <script>
        // 配置 - 从GitHub API读取
        const CONFIG = {
            owner: 'maxcesonrooyrdddr-oss',
            repo: 'xingjiliechang',
            branch: 'main',
            chaptersDir: '章节'
        };

        // 状态
        let currentChapter = 0;
        let chapters = [];
        let isSidebarOpen = true;
        let fontSize = 18;
        let isLoading = false;

        // 从GitHub API获取章节列表
        async function fetchChapterList() {
            try {
                // 添加时间戳防止缓存
                const timestamp = new Date().getTime();
                const response = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.chaptersDir}?ref=${CONFIG.branch}&_t=${timestamp}`);
                if (!response.ok) throw new Error('获取章节列表失败');
                
                const data = await response.json();
                
                // 过滤并解析章节文件
                chapters = data
                    .filter(item => item.name.match(/^第\d+章/))
                    .map(item => {
                        const match = item.name.match(/^第(\d+)章[_-]?(.+?)\.md$/);
                        return {
                            num: match ? parseInt(match[1]) : 0,
                            title: match ? match[2] : item.name,
                            filename: item.name,
                            downloadUrl: item.download_url,
                            sha: item.sha
                        };
                    })
                    .sort((a, b) => a.num - b.num);
                
                return chapters;
            } catch (error) {
                console.error('获取章节列表失败:', error);
                throw error;
            }
        }

        // 从GitHub获取章节内容
        async function fetchChapterContent(chapter) {
            try {
                const response = await fetch(chapter.downloadUrl);
                if (!response.ok) throw new Error('获取章节内容失败');
                
                const markdown = await response.text();
                return formatContent(markdown);
            } catch (error) {
                console.error('获取章节内容失败:', error);
                throw error;
            }
        }

        // 格式化内容（Markdown -> HTML）
        function formatContent(content) {
            content = content.replace('# 星际猎场', '');
            content = content.replace('## 第一卷：废土星火', '');
            content = content.replace(/^# (.+)$/gm, '<h1>$1</h1>');
            content = content.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            content = content.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            content = content.replace(/^---$/gm, '<hr>');
            content = content.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            
            const paragraphs = content.split('\n\n');
            return paragraphs.map(p => {
                p = p.trim();
                if (!p) return '';
                if (p.startsWith('<h') || p.startsWith('<hr')) return p;
                return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
            }).join('');
        }

        // 初始化
        async function init() {
            loadSettings();
            
            try {
                await loadChapterList();
                
                const saved = localStorage.getItem('last-chapter');
                if (saved && chapters.length > 0) {
                    await loadChapter(parseInt(saved));
                } else if (chapters.length > 0) {
                    await loadChapter(1);
                }
            } catch (error) {
                document.getElementById('chapter-content').innerHTML = `
                    <div class="error">
                        <h3>加载失败</h3>
                        <p>无法从GitHub获取章节数据，请检查网络连接</p>
                        <p>错误信息: ${error.message}</p>
                        <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 20px; cursor: pointer;">重新加载</button>
                    </div>
                `;
            }
        }

        // 加载章节列表
        async function loadChapterList() {
            chapters = await fetchChapterList();
            
            document.getElementById('total-chapters').textContent = chapters.length + '章';
            document.getElementById('total-chapter-count').textContent = '共' + chapters.length + '章';
            
            renderChapterList();
            updateLastUpdated();
        }

        // 渲染章节列表
        function renderChapterList() {
            const list = document.getElementById('chapter-list');
            list.innerHTML = '';
            
            chapters.forEach(ch => {
                const li = document.createElement('li');
                li.className = 'chapter-item' + (ch.num === currentChapter ? ' active' : '');
                li.dataset.num = ch.num;
                li.onclick = () => loadChapter(ch.num);
                li.innerHTML = `
                    <span class="chapter-num">第${ch.num}章</span>
                    <span class="chapter-title">${ch.title}</span>
                `;
                list.appendChild(li);
            });
        }

        // 加载指定章节
        async function loadChapter(num) {
            if (num < 1 || num > chapters.length || isLoading) return;
            
            isLoading = true;
            currentChapter = num;
            
            const chapter = chapters.find(c => c.num === num);
            if (!chapter) {
                isLoading = false;
                return;
            }
            
            // 更新UI状态
            document.getElementById('current-title').textContent = '加载中...';
            document.getElementById('chapter-content').innerHTML = '<div class="loading"><div class="loading-spinner"></div><br>正在加载章节内容...</div>';
            
            // 更新列表高亮
            document.querySelectorAll('.chapter-item').forEach(item => {
                item.classList.toggle('active', parseInt(item.dataset.num) === num);
            });
            
            // 滚动到对应章节
            const activeItem = document.querySelector(`.chapter-item[data-num="${num}"]`);
            if (activeItem) activeItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
            
            try {
                // 获取内容
                const content = await fetchChapterContent(chapter);
                
                // 渲染内容
                document.getElementById('current-title').textContent = chapter.title;
                document.getElementById('current-chapter-num').textContent = '第' + num + '章';
                document.getElementById('chapter-content').innerHTML = content;
                document.getElementById('chapter-content').scrollTop = 0;
                
                // 更新导航按钮
                document.getElementById('btn-prev').disabled = num <= 1;
                document.getElementById('btn-next').disabled = num >= chapters.length;
                
                // 保存进度
                localStorage.setItem('last-chapter', num);
                
            } catch (error) {
                document.getElementById('chapter-content').innerHTML = `
                    <div class="error">
                        <h3>加载章节失败</h3>
                        <p>无法加载第${num}章: ${chapter.title}</p>
                        <p>${error.message}</p>
                    </div>
                `;
            }
            
            isLoading = false;
        }

        // 刷新章节列表
        async function refreshChapters() {
            const btn = document.getElementById('btn-refresh');
            btn.disabled = true;
            btn.textContent = '🔄 刷新中...';
            
            try {
                await loadChapterList();
                btn.textContent = '✓ 已更新';
                setTimeout(() => {
                    btn.textContent = '🔄 刷新章节';
                    btn.disabled = false;
                }, 2000);
            } catch (error) {
                btn.textContent = '✗ 刷新失败';
                setTimeout(() => {
                    btn.textContent = '🔄 刷新章节';
                    btn.disabled = false;
                }, 2000);
            }
        }

        // 更新最后更新时间
        function updateLastUpdated() {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN', { 
                month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' 
            });
            document.getElementById('last-updated').textContent = '更新于: ' + timeStr;
        }

        // 导航
        function prevChapter() { loadChapter(currentChapter - 1); }
        function nextChapter() { loadChapter(currentChapter + 1); }
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('hidden');
            isSidebarOpen = !isSidebarOpen;
        }

        // 设置
        function adjustFontSize(delta) {
            fontSize += delta;
            fontSize = Math.max(14, Math.min(24, fontSize));
            document.documentElement.style.setProperty('--font-size', fontSize + 'px');
            localStorage.setItem('font-size', fontSize);
        }

        function toggleTheme() {
            const themes = ['light', 'dark', 'sepia'];
            const current = document.body.getAttribute('data-theme') || 'light';
            const next = themes[(themes.indexOf(current) + 1) % themes.length];
            document.body.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }

        function loadSettings() {
            const savedFontSize = localStorage.getItem('font-size');
            if (savedFontSize) {
                fontSize = parseInt(savedFontSize);
                document.documentElement.style.setProperty('--font-size', fontSize + 'px');
            }
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) document.body.setAttribute('data-theme', savedTheme);
        }

        // 快捷键
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') prevChapter();
            if (e.key === 'ArrowRight') nextChapter();
            if (e.key === 'Escape') toggleSidebar();
        });

        // 启动
        init();
    </script>
</body>
</html>
