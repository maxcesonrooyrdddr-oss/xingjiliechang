<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>星际猎场 - 小说阅读器</title>
    <style>
        :root {
            --bg-color: #f5f5f5; --text-color: #333; --sidebar-bg: #fff;
            --header-bg: #fff; --border-color: #e0e0e0; --accent-color: #1a73e8;
            --hover-bg: #f0f0f0; --font-size: 18px; --line-height: 1.8;
            --danger-color: #d32f2f; --success-color: #388e3c;
        }
        [data-theme="dark"] { --bg-color: #1a1a1a; --text-color: #e0e0e0; --sidebar-bg: #2d2d2d; --header-bg: #2d2d2d; --border-color: #444; --hover-bg: #3d3d3d; }
        [data-theme="sepia"] { --bg-color: #f4ecd8; --text-color: #5b4636; --sidebar-bg: #e8dcc0; --header-bg: #e8dcc0; --border-color: #d4c4a8; --hover-bg: #ddd0b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg-color); color: var(--text-color); line-height: var(--line-height); overflow: hidden; }
        #app { display: flex; height: 100vh; }
        
        /* 侧边栏 */
        .sidebar { width: 350px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; transition: transform 0.3s ease; }
        .sidebar.hidden { transform: translateX(-100%); position: absolute; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border-color); background: linear-gradient(135deg, var(--accent-color), #4285f4); color: white; }
        .sidebar-header h1 { font-size: 1.5em; margin-bottom: 10px; }
        .stats { display: flex; gap: 15px; font-size: 0.85em; opacity: 0.9; }
        .stats span { cursor: pointer; padding: 2px 8px; border-radius: 4px; transition: background 0.2s; }
        .stats span:hover { background: rgba(255,255,255,0.2); }
        .stats span.active { background: rgba(255,255,255,0.3); font-weight: bold; }
        
        /* 卷/章列表 */
        .chapter-list-container { flex: 1; overflow-y: auto; padding: 10px 0; }
        .volume-item { margin-bottom: 5px; }
        .volume-header { 
            padding: 12px 20px; 
            background: var(--hover-bg); 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-left: 3px solid transparent;
            transition: all 0.2s;
        }
        .volume-header:hover { border-left-color: var(--accent-color); }
        .volume-header.expanded { border-left-color: var(--accent-color); background: var(--hover-bg); }
        .volume-title { font-weight: 500; font-size: 0.95em; }
        .volume-toggle { font-size: 0.8em; transition: transform 0.2s; }
        .volume-header.expanded .volume-toggle { transform: rotate(90deg); }
        
        .chapter-list { list-style: none; display: none; }
        .chapter-list.expanded { display: block; }
        .chapter-item { 
            padding: 10px 20px 10px 35px; 
            cursor: pointer; 
            border-left: 3px solid transparent; 
            transition: all 0.2s; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-size: 0.9em;
        }
        .chapter-item:hover { background: var(--hover-bg); border-left-color: var(--accent-color); }
        .chapter-item.active { background: var(--hover-bg); border-left-color: var(--accent-color); font-weight: 500; }
        .chapter-item.loading { opacity: 0.5; }
        .chapter-num { color: var(--accent-color); min-width: 40px; font-size: 0.85em; }
        .chapter-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        /* 操作按钮 */
        .chapter-actions { display: none; gap: 5px; }
        .chapter-item:hover .chapter-actions { display: flex; }
        .action-btn { 
            padding: 2px 6px; 
            font-size: 0.75em; 
            border: none; 
            border-radius: 3px; 
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .action-btn:hover { opacity: 1; }
        .edit-btn { background: var(--accent-color); color: white; }
        .delete-btn { background: var(--danger-color); color: white; }
        
        /* 主内容区 */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { 
            padding: 15px 30px; 
            background: var(--header-bg); 
            border-bottom: 1px solid var(--border-color); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .menu-toggle { display: none; background: none; border: none; font-size: 1.5em; cursor: pointer; color: var(--text-color); }
        .breadcrumb { font-size: 0.9em; color: #666; }
        .breadcrumb span { cursor: pointer; }
        .breadcrumb span:hover { color: var(--accent-color); }
        
        .header-controls { display: flex; gap: 10px; align-items: center; }
        .control-btn { 
            padding: 8px 15px; 
            border: 1px solid var(--border-color); 
            background: var(--bg-color); 
            color: var(--text-color); 
            border-radius: 5px; 
            cursor: pointer; 
            font-size: 0.9em;
            transition: all 0.2s;
        }
        .control-btn:hover { background: var(--hover-bg); }
        
        .content { 
            flex: 1; 
            padding: 40px; 
            overflow-y: auto; 
            font-size: var(--font-size); 
            line-height: var(--line-height);
        }
        .content.loading { display: flex; align-items: center; justify-content: center; }
        .content.loading::after { content: "加载中..."; color: #999; }
        
        /* 编辑模式 */
        .edit-mode { display: none; }
        .edit-mode.active { display: block; }
        .edit-textarea { 
            width: 100%; 
            height: calc(100vh - 200px); 
            padding: 20px; 
            font-size: var(--font-size); 
            line-height: var(--line-height);
            border: 1px solid var(--border-color);
            border-radius: 5px;
            resize: none;
            font-family: inherit;
            background: var(--bg-color);
            color: var(--text-color);
        }
        .edit-actions { 
            display: flex; 
            gap: 10px; 
            padding: 15px; 
            background: var(--header-bg);
            border-top: 1px solid var(--border-color);
        }
        .save-btn { background: var(--success-color); color: white; }
        .cancel-btn { background: #666; color: white; }
        
        /* 阅读模式 */
        .read-mode { display: none; }
        .read-mode.active { display: block; }
        .chapter-title-display { 
            font-size: 1.8em; 
            font-weight: bold; 
            margin-bottom: 30px; 
            padding-bottom: 15px; 
            border-bottom: 2px solid var(--accent-color);
        }
        .chapter-content { white-space: pre-wrap; word-wrap: break-word; }
        .chapter-content h1, .chapter-content h2 { margin: 30px 0 15px; }
        .chapter-content p { margin-bottom: 1.5em; text-indent: 2em; }
        
        /* 空状态 */
        .empty-state { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100%; 
            color: #999; 
        }
        .empty-state-icon { font-size: 4em; margin-bottom: 20px; }
        
        /* 主题切换 */
        .theme-selector { display: flex; gap: 5px; }
        .theme-btn { width: 30px; height: 30px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
        .theme-btn:hover { border-color: var(--accent-color); }
        .theme-btn.active { border-color: var(--accent-color); }
        .theme-light { background: #f5f5f5; border: 1px solid #ddd; }
        .theme-dark { background: #1a1a1a; border: 1px solid #444; }
        .theme-sepia { background: #f4ecd8; border: 1px solid #d4c4a8; }
        
        /* 字体大小 */
        .font-size-controls { display: flex; align-items: center; gap: 10px; }
        .font-size-btn { width: 30px; height: 30px; border: 1px solid var(--border-color); background: var(--bg-color); cursor: pointer; border-radius: 3px; }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar { position: absolute; z-index: 100; height: 100vh; }
            .menu-toggle { display: block; }
            .content { padding: 20px; }
        }
        
        /* 滚动条 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #aaa; }
    </style>
</head>
<body>
    <div id="app">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>星际猎场</h1>
                <div class="stats">
                    <span class="active" onclick="filterByVolume('all')">全部</span>
                    <span onclick="filterByVolume('1')">第一卷</span>
                    <span onclick="filterByVolume('2')">第二卷</span>
                </div>
            </div>
            <div class="chapter-list-container" id="chapterList">
                <!-- 卷/章列表将动态生成 -->
            </div>
        </aside>
        
        <!-- 主内容 -->
        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
                    <div class="breadcrumb" id="breadcrumb">
                        <span onclick="showWelcome()">首页</span>
                    </div>
                </div>
                <div class="header-controls">
                    <div class="font-size-controls">
                        <button class="font-size-btn" onclick="changeFontSize(-2)">A-</button>
                        <button class="font-size-btn" onclick="changeFontSize(2)">A+</button>
                    </div>
                    <div class="theme-selector">
                        <button class="theme-btn theme-light active" onclick="setTheme('light')" title="浅色"></button>
                        <button class="theme-btn theme-sepia" onclick="setTheme('sepia')" title="_sepia"></button>
                        <button class="theme-btn theme-dark" onclick="setTheme('dark')" title="深色"></button>
                    </div>
                </div>
            </header>
            
            <!-- 阅读模式 -->
            <div class="content read-mode active" id="readMode">
                <div class="empty-state" id="emptyState">
                    <div class="empty-state-icon">📚</div>
                    <p>请选择左侧章节开始阅读</p>
                </div>
                <div id="chapterContent" style="display: none;">
                    <div class="chapter-title-display" id="chapterTitle"></div>
                    <div class="chapter-content" id="chapterBody"></div>
                </div>
            </div>
            
            <!-- 编辑模式 -->
            <div class="content edit-mode" id="editMode">
                <textarea class="edit-textarea" id="editTextarea" placeholder="在此编辑章节内容..."></textarea>
                <div class="edit-actions">
                    <button class="control-btn save-btn" onclick="saveChapter()">💾 保存</button>
                    <button class="control-btn cancel-btn" onclick="cancelEdit()">❌ 取消</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 配置
        const CONFIG = {
            owner: 'maxcesonrooyrdddr-oss',
            repo: 'xingjiliechang',
            branch: 'main',
            chaptersDir: '章节'
        };

        // 卷结构定义
        const VOLUMES = [
            {
                id: 1,
                title: '第一卷：灾变废土',
                chapters: [
                    { num: '1-1', title: '第1章·上：废土上的兄妹', file: '第1章_废土上的兄妹_上.md' },
                    { num: '1-2', title: '第1章·中：楚瑶生病', file: '第1章_废土上的兄妹_中.md' },
                    { num: '1-3', title: '第1章·下：黑市交易', file: '第1章_废土上的兄妹_下.md' },
                    { num: '2-1', title: '第2章·上：廉价的命', file: '第2章_廉价的命与高昂的药_上.md' },
                    { num: '2-2', title: '第2章·中：牧场真相', file: '第2章_廉价的命与高昂的药_中.md' },
                    { num: '2-3', title: '第2章·下：楚瑶的聪慧', file: '第2章_廉价的命与高昂的药_下.md' },
                    { num: '3-1', title: '第3章·上：阴云密布', file: '第3章_天空被撕裂的那一天_上.md' },
                    { num: '3-2', title: '第3章·中：采收舰降临', file: '第3章_天空被撕裂的那一天_中.md' },
                    { num: '3-3', title: '第3章·下：冷酷的神明', file: '第3章_天空被撕裂的那一天_下.md' }
                ]
            },
            {
                id: 2,
                title: '第二卷：引擎觉醒',
                chapters: [
                    { num: '11-1', title: '第11章·上：终于等到你', file: '第11章_我终于等到你_上.md' },
                    { num: '11-2', title: '第11章·中：宿命绑定', file: '第11章_我终于等到你_中.md' },
                    { num: '11-3', title: '第11章·下：一人一残机', file: '第11章_我终于等到你_下.md' }
                ]
            }
        ];

        let currentChapter = null;
        let editingChapter = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderChapterList();
            loadTheme();
            loadFontSize();
        });

        // 渲染章节列表
        function renderChapterList(filterVolume = 'all') {
            const container = document.getElementById('chapterList');
            container.innerHTML = '';

            VOLUMES.forEach(volume => {
                if (filterVolume !== 'all' && volume.id !== parseInt(filterVolume)) return;

                const volumeDiv = document.createElement('div');
                volumeDiv.className = 'volume-item';
                
                const header = document.createElement('div');
                header.className = 'volume-header';
                header.innerHTML = `
                    <span class="volume-title">${volume.title}</span>
                    <span class="volume-toggle">▶</span>
                `;
                header.onclick = () => toggleVolume(header, chapterList);
                
                const chapterList = document.createElement('ul');
                chapterList.className = 'chapter-list';
                
                volume.chapters.forEach(chapter => {
                    const li = document.createElement('li');
                    li.className = 'chapter-item';
                    li.dataset.file = chapter.file;
                    li.innerHTML = `
                        <span class="chapter-num">${chapter.num}</span>
                        <span class="chapter-title">${chapter.title}</span>
                        <div class="chapter-actions">
                            <button class="action-btn edit-btn" onclick="event.stopPropagation(); editChapter('${chapter.file}', '${chapter.title}')">编辑</button>
                            <button class="action-btn delete-btn" onclick="event.stopPropagation(); deleteChapter('${chapter.file}', '${chapter.title}')">删除</button>
                        </div>
                    `;
                    li.onclick = () => loadChapter(chapter.file, chapter.title, volume.title);
                    chapterList.appendChild(li);
                });
                
                volumeDiv.appendChild(header);
                volumeDiv.appendChild(chapterList);
                container.appendChild(volumeDiv);
            });
        }

        // 切换卷展开/折叠
        function toggleVolume(header, list) {
            header.classList.toggle('expanded');
            list.classList.toggle('expanded');
        }

        // 按卷筛选
        function filterByVolume(volumeId) {
            document.querySelectorAll('.stats span').forEach(span => span.classList.remove('active'));
            event.target.classList.add('active');
            renderChapterList(volumeId);
        }

        // 加载章节
        async function loadChapter(file, title, volumeTitle) {
            currentChapter = { file, title, volumeTitle };
            
            // 更新UI状态
            document.querySelectorAll('.chapter-item').forEach(item => item.classList.remove('active'));
            document.querySelector(`[data-file="${file}"]`)?.classList.add('active');
            
            // 更新面包屑
            document.getElementById('breadcrumb').innerHTML = `
                <span onclick="showWelcome()">首页</span> / ${volumeTitle} / ${title}
            `;
            
            // 显示加载状态
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('chapterContent').style.display = 'none';
            document.getElementById('readMode').classList.add('loading');
            
            try {
                const timestamp = new Date().getTime();
                const response = await fetch(
                    `https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${CONFIG.branch}/${CONFIG.chaptersDir}/${file}?_t=${timestamp}`
                );
                
                if (!response.ok) throw new Error('章节内容尚未上传');
                
                const content = await response.text();
                document.getElementById('chapterTitle').textContent = title;
                document.getElementById('chapterBody').innerHTML = renderMarkdown(content);
                document.getElementById('chapterContent').style.display = 'block';
                
                // 滚动到顶部
                document.getElementById('readMode').scrollTop = 0;
                
            } catch (error) {
                document.getElementById('chapterTitle').textContent = title;
                document.getElementById('chapterBody').innerHTML = `<p style="color: #999; text-align: center;">${error.message}</p>`;
                document.getElementById('chapterContent').style.display = 'block';
            }
            
            document.getElementById('readMode').classList.remove('loading');
        }

        // 简单的Markdown渲染
        function renderMarkdown(text) {
            return text
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/\*\*(.*)\*\*/gim, '<strong>$1</strong>')
                .replace(/\*(.*)\*/gim, '<em>$1</em>')
                .replace(/\n/gim, '</p><p>');
        }

        // 编辑章节
        async function editChapter(file, title) {
            editingChapter = { file, title };
            
            try {
                const response = await fetch(
                    `https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${CONFIG.branch}/${CONFIG.chaptersDir}/${file}`
                );
                const content = response.ok ? await response.text() : '';
                document.getElementById('editTextarea').value = content;
            } catch {
                document.getElementById('editTextarea').value = '';
            }
            
            document.getElementById('readMode').classList.remove('active');
            document.getElementById('editMode').classList.add('active');
            document.getElementById('breadcrumb').innerHTML = `
                <span onclick="cancelEdit()">返回</span> / 编辑：${title}
            `;
        }

        // 保存章节（前端模拟，实际需要后端支持）
        function saveChapter() {
            const content = document.getElementById('editTextarea').value;
            
            // 由于GitHub Pages是静态托管，这里提供下载功能
            const blob = new Blob([content], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = editingChapter.file;
            a.click();
            URL.revokeObjectURL(url);
            
            alert(`内容已保存为 "${editingChapter.file}"\n\n请上传到GitHub仓库的 "章节" 文件夹中。`);
            cancelEdit();
        }

        // 取消编辑
        function cancelEdit() {
            document.getElementById('editMode').classList.remove('active');
            document.getElementById('readMode').classList.add('active');
            
            if (currentChapter) {
                document.getElementById('breadcrumb').innerHTML = `
                    <span onclick="showWelcome()">首页</span> / ${currentChapter.volumeTitle} / ${currentChapter.title}
                `;
            } else {
                showWelcome();
            }
        }

        // 删除章节（前端模拟）
        function deleteChapter(file, title) {
            if (!confirm(`确定要删除 "${title}" 吗？\n\n（注：需要在GitHub仓库中手动删除文件）`)) return;
            
            alert(`请在GitHub仓库中手动删除文件：\n章节/${file}`);
        }

        // 显示欢迎页
        function showWelcome() {
            currentChapter = null;
            document.getElementById('chapterContent').style.display = 'none';
            document.getElementById('emptyState').style.display = 'flex';
            document.getElementById('breadcrumb').innerHTML = '<span onclick="showWelcome()">首页</span>';
            document.querySelectorAll('.chapter-item').forEach(item => item.classList.remove('active'));
        }

        // 切换侧边栏（移动端）
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('hidden');
        }

        // 主题切换
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.theme-${theme}`).classList.add('active');
            localStorage.setItem('theme', theme);
        }

        function loadTheme() {
            const saved = localStorage.getItem('theme') || 'light';
            setTheme(saved);
        }

        // 字体大小
        function changeFontSize(delta) {
            const root = document.documentElement;
            const current = parseInt(getComputedStyle(root).getPropertyValue('--font-size'));
            const newSize = Math.max(14, Math.min(24, current + delta));
            root.style.setProperty('--font-size', newSize + 'px');
            localStorage.setItem('fontSize', newSize);
        }

        function loadFontSize() {
            const saved = localStorage.getItem('fontSize');
            if (saved) {
                document.documentElement.style.setProperty('--font-size', saved + 'px');
            }
        }
    </script>
</body>
</html>
