<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --bg-color: #f5f5f5;
            --text-color: #333;
            --sidebar-bg: #fff;
            --header-bg: #fff;
            --border-color: #e0e0e0;
            --accent-color: #1a73e8;
            --hover-bg: #f0f0f0;
            --font-size: 18px;
            --line-height: 1.8;
        }
        
        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
            --sidebar-bg: #2d2d2d;
            --header-bg: #2d2d2d;
            --border-color: #444;
            --hover-bg: #3d3d3d;
        }
        
        [data-theme="sepia"] {
            --bg-color: #f4ecd8;
            --text-color: #5b4636;
            --sidebar-bg: #e8dcc0;
            --header-bg: #e8dcc0;
            --border-color: #d4c4a8;
            --hover-bg: #ddd0b8;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            line-height: var(--line-height);
            overflow: hidden;
        }
        
        #app { display: flex; height: 100vh; }
        
        .sidebar {
            width: 300px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }
        
        .sidebar.hidden { transform: translateX(-100%); position: absolute; }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(135deg, var(--accent-color), #4285f4);
            color: white;
        }
        
        .sidebar-header h1 { font-size: 1.5em; margin-bottom: 10px; }
        
        .stats { display: flex; gap: 15px; font-size: 0.85em; opacity: 0.9; }
        
        .chapter-list-container { flex: 1; overflow-y: auto; padding: 10px 0; }
        
        .chapter-list { list-style: none; }
        
        .chapter-item {
            padding: 12px 20px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chapter-item:hover { background: var(--hover-bg); border-left-color: var(--accent-color); }
        .chapter-item.active { background: var(--hover-bg); border-left-color: var(--accent-color); font-weight: 500; }
        
        .chapter-num { font-size: 0.9em; color: var(--accent-color); min-width: 50px; }
        .chapter-title { flex: 1; margin-left: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .reader-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        .reader-header {
            height: 60px;
            background: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .btn-toggle-sidebar {
            width: 40px; height: 40px; border: none; background: transparent;
            font-size: 1.2em; cursor: pointer; color: var(--text-color); border-radius: 6px;
        }
        .btn-toggle-sidebar:hover { background: var(--hover-bg); }
        
        .reader-header h2 {
            flex: 1; text-align: center; font-size: 1.1em; font-weight: 500;
            padding: 0 20px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        
        .reader-tools { display: flex; gap: 8px; }
        .tool-btn {
            width: 36px; height: 36px; border: 1px solid var(--border-color);
            background: transparent; border-radius: 6px; cursor: pointer;
            font-size: 0.9em; color: var(--text-color);
        }
        .tool-btn:hover { background: var(--hover-bg); }
        
        .chapter-content {
            flex: 1; overflow-y: auto; padding: 40px 60px;
            font-size: var(--font-size); line-height: var(--line-height);
        }
        
        .chapter-content h1 { font-size: 1.8em; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 2px solid var(--accent-color); }
        .chapter-content h2 { font-size: 1.4em; margin: 30px 0 15px; color: var(--accent-color); }
        .chapter-content h3 { font-size: 1.2em; margin: 25px 0 12px; }
        .chapter-content p { margin-bottom: 1.5em; text-indent: 2em; text-align: justify; }
        .chapter-content p:first-of-type { text-indent: 0; }
        .chapter-content strong { color: var(--accent-color); }
        .chapter-content hr { margin: 30px 0; border: none; border-top: 1px solid var(--border-color); }
        
        .reader-footer {
            height: 60px; background: var(--header-bg); border-top: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between; padding: 0 40px;
        }
        
        .nav-btn {
            padding: 10px 25px; border: 1px solid var(--border-color); background: transparent;
            border-radius: 6px; cursor: pointer; font-size: 0.95em; color: var(--text-color);
        }
        .nav-btn:hover:not(:disabled) { background: var(--accent-color); color: white; border-color: var(--accent-color); }
        .nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .progress-info { font-size: 0.9em; color: #666; }
        .progress-info .divider { margin: 0 8px; color: #ccc; }
        
        @media (max-width: 768px) {
            .sidebar { position: absolute; width: 280px; }
            .chapter-content { padding: 20px 30px; }
            .reader-footer { padding: 0 20px; }
            .nav-btn { padding: 8px 15px; font-size: 0.85em; }
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #aaa; }
    </style>
</head>

    <script>
        // 章节数据 - 会被构建脚本替换为实际内容
        const chaptersData = [{"num": 1, "title": "屠宰场与真理引擎", "content": "<hr>\n<h1>第1章：屠宰场与真理引擎</h1>\n<p><strong>降临日后第30天，14:00。</strong></p>\n<p><strong>7号收割区，原亚洲东部联合区。</strong></p>\n<p>天空是铁锈色的。</p>\n<p>不是黄昏，也不是雾霾——那是悬浮在近地轨道上的\"天穹采收塔\"投下的阴影。巨大的六边形结构遮蔽了太阳，只在云层上投下蜂巢般的几何光斑。每一道光斑的中央，都有一根无形的吸管，正在抽取着什么。</p>\n<p>抽取的是灵魂。</p>\n<p>楚锐跪在提取台的凹槽里，双手被磁约束环锁死，脊椎贴着冰冷的金属导管。他能感觉到那导管正在发出低频震颤，像一只贪婪的蚊子，将口器刺入他的后颈，寻找着脑髓中最甜美的部分。</p>\n<p>他的妹妹楚芸，三天前死在了这台机器上。</p>\n<p>他亲眼看着她被推上去，看着她的眼睛从惊恐变成空洞，看着她的皮肤迅速干瘪、发黑，最后像一截枯木般被丢进传送带，送往不知道什么地方的精炼炉。</p>\n<p>据说人类的意识——那种被称为\"灵魂\"的量子态信息结构——是极好的能源。一个成年人的灵魂，可以为一艘外星巡逻艇提供三天的动力。</p>\n<p>\"第7749号实验体，脑域开发度7.3%，符合'高级灵魂电池'标准。\"</p>\n<p>头顶传来机械化的合成音，用的是地球语言，但语调中带着明显的外星口音——那种把元音拉得过长、辅音又咬得过重的腔调，像是在模仿人类，却又毫不在意模仿得像不像。</p>\n<p>楚锐抬起头。</p>\n<p>提取台周围站着三个身影。</p>\n<p>最前面的是一个扎尔贡人——外星监工扎戈。它有三米高，身体像是一根过度生长的藤蔓，表面覆盖着甲壳质的灰绿色外骨骼。六只复眼在头部的环形排列中缓慢转动，每一只都倒映着楚锐狼狈的身影。</p>\n<p>\"有趣。\"扎戈的声音直接从它的腹部震动传出，带着金属质感的嗡鸣，\"这个样本的眼神……不像其他猴子那样绝望。它在恨我。\"</p>\n<p>它弯下腰，其中一只复眼几乎贴到楚锐脸上。楚锐能闻到它呼吸中的臭氧味——那是高维能量代谢的副产物。</p>\n<p>\"恨我？\"扎戈发出一种类似笑声的颤音，\"为什么？因为你妹妹？她死得很痛苦， screams lasted for twelve seconds. 她的灵魂频率非常甜美，是上等品。你应该感到荣幸。\"</p>\n<p>楚锐没有回答。</p>\n<p>他的眼睛盯着扎戈腰间的那把武器。</p>\n<p>高频震荡刃。C级科技。</p>\n<p>他在废土上拾荒时见过这种武器的残骸。一米长的刀身，刀柄处镶嵌着一颗米粒大小的蓝晶——那是微型聚变电池，可以为刀刃提供足以切断分子键的高频振动。</p>\n<p>他研究过。他拆解过残骸。他知道它的原理。</p>\n<p>但他从来没有机会真正使用它。</p>\n<p>\"开始提取。\"扎戈直起身，失去了兴趣，\"把它的灵魂抽出来，送到第3号精炼塔。今天的高级电池配额还差十二个。\"</p>\n<p>\"是，监工大人。\"</p>\n<p>两个外星守卫走上前，开始操作提取台的控制台。楚锐感觉到后颈的导管开始发热，那种震颤变得更加剧烈，像是有一只无形的手，正在把他的大脑从颅骨中慢慢地、慢慢地拔出来。</p>\n<p>痛。</p>\n<p>不是肉体的痛，是更深层的某种东西被撕裂的痛。仿佛有人正在把他的记忆、他的情感、他的自我，一点点地从他身上剥离开来。</p>\n<p>他想起了楚芸最后的眼神。</p>\n<p>她看着他。她没有说话，但她的眼睛在说话。</p>\n<p>\"哥哥，救我。\"</p>\n<p>然后她就死了。</p>\n<p>而他什么也做不了。他只能像只被绑在砧板上的猴子一样，眼睁睁看着。他只是个废土拾荒者，每天为了半块发霉的压缩饼干就要冒着辐射尘出去翻找垃圾。他连一把像样的武器都没有。他连外星人的皮肤都划不破。</p>\n<p>他是个废物。</p>\n<p>他一直都是个废物。</p>\n<p>\"提取进度：10%。\"机械音播报着，\"预计完成时间：90秒。\"</p>\n<p>楚锐的视野开始模糊。他感觉到自己的记忆正在流失——不是遗忘，是被抽走。就像有人正在把他的大脑像硬盘一样格式化，而且用的是最慢速的、最痛苦的方式，一个扇区一个扇区地擦除。</p>\n<p>他想起了母亲。她死在降临日的第一波轰炸中。</p>\n<p>他想起了父亲。他试图反抗，被等离子枪蒸发成了气体。</p>\n<p>他想起了楚芸。她死在这台机器上。她死前在喊他。她相信他。她相信她的哥哥会救她。</p>\n<p>但他没有。</p>\n<p>他是个废物。</p>\n<p>他是个废物！</p>\n<p><strong>\"提取进度：50%。\"</strong></p>\n<p>愤怒。</p>\n<p>那不是普通的愤怒。那是从灵魂最深处燃烧起来的、足以焚毁一切的怒火。它不是红色的，它是黑色的，它是冰冷的，它是绝对零度的疯狂。</p>\n<p>楚锐想要撕碎这个世界。</p>\n<p>他想要撕碎这些外星人。他想要撕碎这台机器。他想要撕碎这个把人类当作家畜一样圈养、屠宰、提炼的宇宙。</p>\n<p>他想要力量。</p>\n<p>他愿意付出一切代价——他的血肉，他的灵魂，他的理智，他的未来——只要给他力量，让他能够站起来，让他能够握紧拳头，让他能够把这些狗娘养的外星杂种一个个撕成碎片！</p>\n<p><strong>\"提取进度：80%。\"</strong></p>\n<p>就在这时，异变发生了。</p>\n<p>在楚锐的脑海深处，在意识的黑暗中，有什么东西……<strong>亮了起来</strong>。</p>\n<p>那不是光。那是比光更古老的东西。那是信息。那是代码。那是某种……<strong>权限</strong>。</p>\n<p>【检测到宿主生命体征濒临临界值】</p>\n<p>【检测到宿主意识强度突破阈值】</p>\n<p>【检测到宿主……符合觉醒条件】</p>\n<p>【零号真理引擎……启动】</p>\n<p>声音不是从外界传来的，它是直接在楚锐的思维中响起的。不是人类的语言，不是任何已知的语言，但楚锐却能理解它的意思——就像那是他天生就该懂得的东西，就像那是刻在他基因最深处的记忆。</p>\n<p>然后，他\"看见\"了。</p>\n<p>在他的视野中，整个世界突然变得……<strong>透明</strong>了。</p>\n<p>他看见了扎戈。但那不是扎戈的身体，那是扎戈的\"结构\"——每一个细胞，每一条神经，每一块外骨骼的分子排列，都清晰地呈现在他的感知中。就像有人给他戴上了一副能够看到微观世界的眼镜，而且这副眼镜还自带了<strong>分析功能</strong>。</p>\n<p>【目标：扎尔贡人（碳基-硅基混合生命体）】<br>【威胁等级：C级】<br>【核心弱点：腹部第二节外骨骼下方3厘米处，神经中枢节点】<br>【建议战术：高频震荡刃刺入，角度47度，可瞬间切断主要神经束】</p>\n<p>信息直接涌入了楚锐的大脑。不是学习，不是理解，而是……<strong>下载</strong>。就像有人把这些知识直接拷贝进了他的记忆库，让他瞬间就知道了该如何杀死面前这个三米高的怪物。</p>\n<p>但这还不是全部。</p>\n<p>他的感知继续延伸，触及了提取台，触及了那根插入他后颈的导管，触及了那台正在抽取他灵魂的机器。</p>\n<p>【目标：灵魂提取仪（C级生物科技）】<br>【功能：抽取碳基生命的意识体作为能源】<br>【核心原理：量子态信息共振转移】<br>【当前状态：运行中，提取进度83%】<br>【可解析：是】<br>【解析时间：17秒】<br>【是否开始解析？】</p>\n<p>楚锐没有犹豫。</p>\n<p>他在心中怒吼：<strong>解析！</strong></p>\n<p>【解析开始……】</p>\n<p>剧痛。</p>\n<p>比之前强十倍的剧痛瞬间淹没了楚锐的神经系统。那不是肉体的痛，那是大脑被强行超频运转的痛——就像有人把他的大脑塞进了一台超速运转的计算机，强迫它以每秒亿万次的速度处理海量的信息。</p>\n<p>他看见了。他看见了灵魂提取仪的每一个零件，看见了它的每一个回路，看见了它的设计蓝图，看见了它的工作原理。</p>\n<p>他理解了。他理解了量子态信息共振。他理解了如何将意识从一个载体转移到另一个载体。他理解了……如何反向操作这台机器。</p>\n<p>【解析完成】<br>【获得技术碎片：灵魂共振（初级）】<br>【解锁能力：【灵魂抽取】（初级）】<br>【使用方式：接触目标，发动能力，可将目标生命体的意识体强行剥离】<br>【限制：仅对C级及以下生命体有效，消耗大量生物电能，每日限用3次】</p>\n<p>信息涌入的同时，楚锐感觉到自己的身体也在发生变化。</p>\n<p>他的肌肉在颤抖，他的骨骼在嗡鸣，他的每一个细胞都在被某种力量强行改造。那不是舒适的改造，那是暴力的、野蛮的、如同把一块废铁锻造成钢刀般的改造。</p>\n<p>基因撕裂般的剧痛贯穿了他的全身。</p>\n<p>但他没有惨叫。他只是咬紧了牙关，嘴角甚至露出了一丝……<strong>笑容</strong>。</p>\n<p>因为他感觉到了。</p>\n<p>他感觉到了力量。他感觉到了那种从未有过的、充斥着每一个细胞的、让他想要仰天长啸的力量。</p>\n<p><strong>\"提取进度：95%……异常！异常！目标生命体征异常回升！\"</strong></p>\n<p>机械音突然变得尖锐，带着明显的慌乱。</p>\n<p>扎戈猛地转过头，六只复眼同时锁定了楚锐。它感觉到了。它感觉到了某种令它不安的气息——那是猎物变成猎手的气息，那是食物链底层突然向上攀爬的气息。</p>\n<p>\"怎么回事？！\"扎戈厉声喝道，\"加大功率！立刻完成提取！\"</p>\n<p>\"是！最大功率输——\"</p>\n<p>守卫的话没能说完。</p>\n<p>因为楚锐动了。</p>\n<p>磁约束环还在锁着他的双手，但已经不需要了。他只需要……<strong>解析</strong>它们。</p>\n<p>【目标：磁约束环（D级约束装置）】<br>【结构弱点：能量传导节点过载阈值】<br>【破解方式：反向注入生物电能，造成回路短路】</p>\n<p>楚锐心念一动，体内那股刚刚觉醒的、被称为\"生物电能\"的能量瞬间涌出，顺着磁约束环的能量回路逆向灌入。</p>\n<p>砰！</p>\n<p>两道蓝光闪过，磁约束环爆炸了。楚锐的双手恢复了自由。</p>\n<p>他一跃而起。</p>\n<p>那不是人类应该有的速度。那是超越了肌肉极限的、由生物电能驱动的爆发。在扎戈和守卫们反应过来之前，楚锐已经冲到了扎戈面前。</p>\n<p>\"你——\"扎戈的复眼中第一次出现了恐惧。</p>\n<p>楚锐没有给它说话的机会。</p>\n<p>他的右手如闪电般探出，五指张开，狠狠地按在了扎戈的腹部——那个真理引擎标记出来的神经中枢节点上。</p>\n<p>【灵魂抽取】</p>\n<p>发动。</p>\n<p>扎戈的身体瞬间僵直。它想要尖叫，但它已经失去了尖叫的权限——它的声音神经在0.1秒内就被切断了。它想要挣扎，但它已经失去了挣扎的能力——它的运动神经在0.2秒内就被麻痹了。</p>\n<p>它只能眼睁睁地看着，感受着，自己生命的本质，自己数百年积累的意识，自己作为\"扎戈\"的一切……被那只按在它腹部的人类之手，<strong>硬生生地拽了出来</strong>。</p>\n<p>那是一团蓝色的光。模糊的人形，那是扎戈灵魂的量子态投影。它在楚锐的手中挣扎、扭曲、发出无声的尖啸，然后……被吸入了楚锐的体内。</p>\n<p>【灵魂抽取成功】<br>【获得灵魂能量：中等】<br>【获得记忆碎片：扎尔贡人语言、基础科技知识、7号收割区布防图】<br>【生物电能恢复30%】<br>【等级提升：Tier 0 Level 1】</p>\n<p>楚锐闭着眼睛，深深地吸了一口气。</p>\n<p>那是一种无法形容的快感。就像是干旱了数年的大地突然迎来了暴雨，就像是饥饿了数十天的野兽突然吞噬了猎物。他感觉到那股来自扎戈的灵魂能量正在他的体内流转，修复着他被提取仪损伤的神经，强化着他刚刚觉醒的每一个细胞。</p>\n<p>他睁开眼睛。</p>\n<p>瞳孔的颜色变了。从原本的黑色，变成了淡淡的金色——那是生物电能充盈的标志。</p>\n<p>两个外星守卫已经呆立在原地，它们的手中握着武器，但它们的身体在颤抖。它们无法理解眼前发生的一切。它们无法理解，为什么一个即将被抽干灵魂的猴子，突然变成了能够瞬间击杀它们监工的怪物。</p>\n<p>\"怪……怪物……\"其中一个守卫喃喃道，用的是扎尔贡语，但楚锐听懂了——真理引擎自动翻译了。</p>\n<p>楚锐转过头，看向它们。</p>\n<p>他的嘴角勾起了一个笑容。那是一个充满了戾气、充满了疯狂、充满了……<strong>饥饿</strong>的笑容。</p>\n<p>\"怪物？\"他用扎尔贡语回答道，声音沙哑却清晰，\"不，我是你们的……<strong>噩梦</strong>。\"。</p>\n<p>下一秒，他消失了。</p>\n<p>不，不是消失。是移动得太快，以至于守卫的眼睛无法捕捉到他的轨迹。当楚锐再次出现时，他已经站在了第一个守卫的身后，右手五指并拢如刀，刺入了守卫后颈的甲壳缝隙。</p>\n<p>【灵魂抽取】</p>\n<p>第二个。</p>\n<p>然后第三个。</p>\n<p>整个过程不超过十秒。当楚锐重新站直身体时，三个外星人的灵魂已经被他吞噬殆尽。他们的躯壳倒在地上，干瘪、空洞，就像……就像那些被提取仪抽干的地球人一样。</p>\n<p>楚锐站在三具尸体中间，静静地感受着体内的变化。</p>\n<p>力量。更多的力量。在流淌，在膨胀，在叫嚣。</p>\n<p>他弯下腰，从扎戈的尸体腰间拔出了那把高频震荡刃。C级科技。一米长的刀身，刀柄处的蓝晶正在发出稳定的微光。</p>\n<p>他握紧刀柄。</p>\n<p>【目标：高频震荡刃（C级能量武器）】<br>【当前状态：完好】<br>【可解析：是】<br>【解析时间：3分42秒】<br>【是否开始解析？】</p>\n<p>楚锐没有立刻解析。他只是握着刀，感受着刀身传来的轻微震颤——那是高频振动模块正在运转的标志。</p>\n<p>他抬起头，看向提取室外面的世界。</p>\n<p>透过观察窗，他能看到7号收割区的景象。巨大的灵魂提取塔林立在地平线上，每一座塔都在发出幽蓝色的光芒，那是无数人类灵魂被燃烧时产生的辉光。输送带在天空中交错，运送着一具具干瘪的人类躯壳。更远处的精炼区，巨大的烟囱正在喷吐着绿色的烟雾——那是灵魂被提炼后的废气。</p>\n<p>这是地狱。这是人类的地狱。这是外星人的屠宰场。</p>\n<p>而现在，一头猎物，刚刚觉醒了。</p>\n<p>楚锐推开提取室的门，走了出去。</p>\n<p>阳光——透过天穹采收塔缝隙投下的、斑驳的阳光——照在他的脸上。他眯起眼睛，感受着那久违的温暖。</p>\n<p>在他的脑海中，真理引擎正在无声地运转，分析着周围的一切，标记着每一个外星生物的位置，计算着最佳的猎杀路线。</p>\n<p>【扫描范围：半径500米】<br>【检测到外星生命体：17个】<br>【威胁等级：D级12个，C级4个，B级1个】<br>【建议战术：逐个击破，优先猎杀D级目标，积累能量后挑战C级】</p>\n<p>楚锐接受了这个建议。</p>\n<p>他握紧手中的高频震荡刃，刀身在阳光下反射出冰冷的光芒。</p>\n<p>\"妹妹。\"他在心中轻声说道，\"哥哥来给你……<strong>收利息了</strong>。\"。</p>\n<p>然后，他迈步向前，走入了那片废土。</p>\n<p>在他身后，提取室的警报声终于响起，尖锐的嘶鸣划破了7号收割区的天空。但已经太迟了。猎物已经变成了猎手，而猎手，已经入场。</p>\n<p><strong>第1章：屠宰场与真理引擎 · 完</strong></p>\n<hr>\n<p><strong>【作者注】</strong></p>\n<p>第一章字数：约9000字<br>核心目标：世界观建立 + 主角觉醒 + 第一个爽点<br>关键设定：零号真理引擎、灵魂抽取、Tier 0 Level 1<br>下章预告：楚锐开始在7号收割区猎杀外星士兵，逐步解锁更多能力，并首次遭遇苏星陨</p>"}, {"num": 2, "title": "废土猎杀与第一次进化", "content": "<h1>第2章：废土猎杀与第一次进化</h1>\n<p><strong>降临日后第30天，14:15。</strong></p>\n<p><strong>7号收割区，地表废墟。</strong></p>\n<p>警报声像一把锯子，撕扯着7号收割区浑浊的空气。</p>\n<p>楚锐站在提取室的金属走廊上，手中握着那把从扎戈尸体上缴获的高频震荡刃。刀身发出轻微的嗡鸣，那是高频振动模块运转的声音，像是一只被驯服的野兽在低吼。</p>\n<p>他的视野中，真理引擎的界面无声地运转着。</p>\n<p>【扫描范围：半径500米】<br>【检测到外星生命体：17个】<br>【D级（普通守卫）：12个】<br>【C级（低级军官）：4个】<br>【B级（区域指挥官）：1个】</p>\n<p>【建议战术：】<br>【1. 优先猎杀D级目标，积累生物电能】<br>【2. 避免与B级目标正面接触】<br>【3. 利用废墟地形进行游击】</p>\n<p>楚锐接受了这个建议。</p>\n<p>他不是莽夫。三年的废土生存教会了他一个道理：活下来的才是赢家，死了的连复仇的资格都没有。</p>\n<p>他深吸一口气，感受着体内流淌的力量。</p>\n<p>【当前状态】<br>【等级：Tier 0 Level 1】<br>【生物电能：78%】<br>【已解锁能力：灵魂抽取（初级）、基础扫描】<br>【今日剩余使用次数：灵魂抽取 2/3】</p>\n<p>灵魂抽取每天只能用三次。刚才对付扎戈和两个守卫，已经用掉了一次。剩下的两次，必须用在刀刃上。</p>\n<p>楚锐握紧震荡刃，身形一闪，消失在走廊的拐角处。</p>\n<hr>\n<p><strong>14:20。</strong></p>\n<p>7号收割区的地表是一片废墟。</p>\n<p>这里曾经是亚洲最大的城市群之一，有着摩天大楼、立交桥、地下商业街。现在只剩下扭曲的钢筋、破碎的玻璃、和无处不在的辐射尘。</p>\n<p>风吹过废墟，发出呜咽般的声音，像是这座城市尚未死去的灵魂在哭泣。</p>\n<p>楚锐贴着一面半倒塌的混凝土墙，呼吸放得极轻。他的眼睛透过墙上的裂缝，观察着前方五十米处的一个外星巡逻小队。</p>\n<p>四个D级守卫。标准的巡逻配置。</p>\n<p>它们的外形和扎戈有些相似，但体型更小，只有两米高，外骨骼也更单薄。它们手持的是D级等离子步枪，威力足以在混凝土墙上烧出一个洞，但射程和射速都很有限。</p>\n<p>【目标：扎尔贡巡逻队（D级×4）】<br>【威胁等级：低】<br>【建议战术：利用废墟接近，近战优先，避免被集火】<br>【预计解决时间：45秒】</p>\n<p>45秒。</p>\n<p>楚锐计算着时间。巡逻队的换岗周期是10分钟，刚才的警报已经过去5分钟，再过5分钟就会有增援赶到。</p>\n<p>他必须在5分钟内解决战斗，然后撤离。</p>\n<p>楚锐深吸一口气，然后——</p>\n<p>冲了出去。</p>\n<p>不是直线冲刺，而是之字形的不规则移动。这是他在废土上练习了三年的移动方式，利用每一块碎石、每一根钢筋作为掩护，让敌人无法锁定他的轨迹。</p>\n<p>\"敌袭！\"</p>\n<p>巡逻队发现了他的踪迹。四个守卫同时抬起等离子步枪，蓝色的能量束划破空气，在楚锐身后的墙壁上烧出一个个焦黑的坑洞。</p>\n<p>但楚锐太快了。</p>\n<p>生物电能充盈的肌肉爆发出超越人类极限的力量，他的每一步都能跨出三四米远，身形在废墟间闪烁，像是一道黑色的闪电。</p>\n<p>二十米。</p>\n<p>十米。</p>\n<p>五米。</p>\n<p>第一个守卫终于锁定了他的轨迹，等离子步枪的枪口喷吐出致命的光芒。但就在能量束即将命中楚锐的瞬间，他的身形诡异地一侧——</p>\n<p>【基础扫描】发动。</p>\n<p>在他的视野中，那道能量束的轨迹被清晰地标记出来，就像是慢动作回放一样。他提前0.3秒预判了射击角度，身体自然而然地做出了规避动作。</p>\n<p>能量束擦着他的肩膀飞过，高温烧焦了他的衣服，但没有伤到他分毫。</p>\n<p>然后，楚锐出现在了第一个守卫的面前。</p>\n<p>守卫的复眼中闪过一丝惊恐。它想要后退，想要重新瞄准，但已经太迟了。</p>\n<p>楚锐的右手如闪电般探出，五指并拢如刀，狠狠地刺入了守卫胸口的甲壳缝隙——那里是基础扫描标记出来的弱点，神经中枢的节点。</p>\n<p>【灵魂抽取】</p>\n<p>发动。</p>\n<p>守卫的身体瞬间僵直。它甚至来不及发出惨叫，生命的本质就被那只人类之手硬生生地拽了出来。</p>\n<p>那是一团比扎戈更小、更暗淡的蓝色光团。楚锐没有犹豫，直接将它吸入了体内。</p>\n<p>【灵魂抽取成功】<br>【获得灵魂能量：微量】<br>【生物电能恢复15%】</p>\n<p>与此同时，另外三个守卫终于反应过来，等离子步枪的枪口同时对准了楚锐。</p>\n<p>\"去死吧，猴子！\"</p>\n<p>三道光束同时射出，封锁了楚锐所有的闪避角度。</p>\n<p>但楚锐没有闪避。</p>\n<p>他左手一扬，那把从扎戈身上缴获的高频震荡刃脱手而出，在空中划出一道银色的弧线——</p>\n<p>【目标：D级守卫×3】<br>【弱点：颈部甲壳缝隙】<br>【距离：7.3米】<br>【建议投掷角度：23度】</p>\n<p>真理引擎的计算精确到毫秒。震荡刃在空中旋转了半圈，准确地切入了第一个守卫的颈部，然后余势不减地贯穿了第二个守卫的胸口，最后卡在了第三个守卫的肩胛骨上。</p>\n<p>高频振动的刀刃轻易地撕裂了D级守卫单薄的外骨骼，就像切开豆腐一样轻松。</p>\n<p>三个守卫同时倒地。</p>\n<p>楚锐走上前，从尸体上拔出了震荡刃，然后依次将手按在它们的胸口。</p>\n<p>【灵魂抽取】×3</p>\n<p>【灵魂抽取成功×3】<br>【获得灵魂能量：微量×3】<br>【生物电能恢复35%】<br>【当前生物电能：100%（已满）】</p>\n<p>【检测到生物电能溢出……】<br>【是否进行等级突破？】</p>\n<p>楚锐一愣。</p>\n<p>等级突破？</p>\n<p>【说明：生物电能已达到当前等级上限，可选择：】<br>【A. 将溢出能量转化为身体强化（永久提升基础属性）】<br>【B. 尝试突破至 Tier 0 Level 2（有15%失败概率，失败后进入24小时虚弱期）】</p>\n<p>楚锐没有犹豫。</p>\n<p>\"突破。\"</p>\n<p>【等级突破开始……】</p>\n<p>剧痛。</p>\n<p>比之前任何一次都要剧烈的疼痛瞬间席卷了他的全身。他感觉自己的每一个细胞都在被撕裂、重组、再撕裂、再重组。基因链在高温下扭曲、断裂、重新连接。</p>\n<p>他跪倒在地，双手死死地抓住地面，指甲在混凝土上划出深深的痕迹。</p>\n<p>汗水如雨般从他的额头滴落，混杂着从毛孔中渗出的黑色杂质——那是他体内积累的毒素和辐射尘，被突破时的能量净化排出。</p>\n<p>时间仿佛被拉长了。</p>\n<p>一秒钟像一个世纪那么漫长。</p>\n<p>楚锐咬紧牙关，不让自己发出惨叫。他知道，如果现在发出声音，就会把更多的敌人引过来。他必须忍耐。</p>\n<p>终于——</p>\n<p>【等级突破成功！】<br>【当前等级：Tier 0 Level 2】<br>【解锁能力：肉体强化（初级）】<br>【肉体强化：可局部硬化肌肉，提升防御力和力量】<br>【基础属性提升：力量+30%，速度+20%，恢复力+50%】</p>\n<p>楚锐缓缓站起身，感受着体内涌动的全新力量。</p>\n<p>他握了握拳，空气中传来一声清脆的音爆。</p>\n<p>这是……质变。</p>\n<p>【当前状态】<br>【等级：Tier 0 Level 2】<br>【生物电能：23%】<br>【已解锁能力：灵魂抽取（初级）、基础扫描、肉体强化（初级）】<br>【今日剩余使用次数：灵魂抽取 0/3（已用完）】</p>\n<p>灵魂抽取的次数用完了。但在突破后，他的基础属性大幅提升，即使不用能力，正面战斗力也足以碾压D级守卫。</p>\n<p>更重要的是，他解锁了新的能力——【肉体强化】。</p>\n<p>楚锐心念一动，发动了【肉体强化】。</p>\n<p>他的右臂肌肉瞬间膨胀，皮肤变得如同钢铁般坚硬，泛着淡淡的金属光泽。他能感觉到，这一拳下去，足以打穿混凝土墙壁。</p>\n<p>\"有趣。\"</p>\n<p>一个声音突然从废墟的阴影中传来。</p>\n<p>楚锐猛地转身，高频震荡刃横在胸前，全身肌肉绷紧，进入了战斗状态。</p>\n<p>\"谁？\"</p>\n<p>阴影中，一个人影缓缓走出。</p>\n<p>那是一个女人。看起来二十岁左右，身材修长，穿着一件由各种废料拼凑而成的灰色斗篷。她的脸被兜帽遮住了一半，只露出下巴和一张苍白的嘴唇。</p>\n<p>但最引人注目的，是她的眼睛。</p>\n<p>那是一双深紫色的眼睛，瞳孔中似乎有星光在流转，美丽而神秘。</p>\n<p>\"别紧张。\"女人的声音很轻柔，带着一种奇异的韵律，\"如果我想对你不利，刚才你突破的时候，就已经死了。\"</p>\n<p>楚锐没有放松警惕。真理引擎正在疯狂地扫描着眼前的女人。</p>\n<p>【目标：未知人类女性】<br>【威胁等级：无法评估】<br>【特殊状态：检测到高强度脑域活动，疑似精神力觉醒者】<br>【建议：保持警惕，不要直视其双眼】</p>\n<p>精神力觉醒者？</p>\n<p>楚锐皱起眉头。他在废土上听说过这种存在——那些天生脑域开发度就远超常人的\"异能者\"。他们不需要科技，不需要改造，只需要依靠纯粹的精神力，就能做到各种不可思议的事情。</p>\n<p>但这种人极其罕见。据说一万个人里才有一个，而且大部分都在降临日的时候被外星人抓走做实验了。</p>\n<p>\"你是谁？\"楚锐冷声问道。</p>\n<p>女人微微一笑，那笑容中带着一丝苦涩。</p>\n<p>\"我叫苏星陨。\"她说，\"和你一样，也是这屠宰场里的……猎物。\"</p>\n<p>\"只不过，我一直在等待一个能够反杀猎手的人出现。\"</p>\n<p>她抬起头，深紫色的眼眸直视着楚锐，目光中带着一种近乎偏执的期待。</p>\n<p>\"而你，楚锐，我等的就是你。\"</p>\n<p><strong>第2章：废土猎杀与第一次进化 · 完</strong></p>\n<hr>\n<p><strong>【本章总结】</strong></p>\n<p>- 楚锐猎杀外星巡逻队，获取灵魂能量<br>- 生物电能满溢，进行第一次等级突破（Tier 0 Level 1 → Level 2）<br>- 解锁新能力【肉体强化】<br>- 女主苏星陨正式登场<br>- 伏笔：苏星陨一直在等待楚锐的出现</p>"}, {"num": 3, "title": "苏星陨与废土之下的真相", "content": "<h1>第3章：苏星陨与废土之下的真相</h1>\n<p><strong>降临日后第30天，14:40。</strong></p>\n<p><strong>7号收割区，地下掩体。</strong></p>\n<p>楚锐跟着苏星陨穿过一条隐秘的地下通道，来到了一处隐藏在废墟深处的地下掩体。</p>\n<p>这里曾经是一座地铁站的维修间，现在被改造成了一个简陋的避难所。空气中弥漫着霉味和血腥味，墙壁上用荧光涂料画着各种符号和标记，像是一种只有幸存者才懂的密码。</p>\n<p>掩体里挤满了人。</p>\n<p>有老人，有孩子，有残疾人。他们蜷缩在角落里，眼神空洞而麻木，像是一群等待屠宰的牲畜。</p>\n<p>\"这里是？\"楚锐皱起眉头。</p>\n<p>\"04号掩体。\"苏星陨脱下兜帽，露出一张苍白却美丽的脸，\"人类反抗军的地下据点之一。当然，现在还没有'反抗军'这个名字，我们只是一群苟延残喘的老鼠。\"</p>\n<p>她走到一张破旧的桌子前，从抽屉里拿出一份泛黄的城市地图，铺在桌面上。</p>\n<p>\"楚锐，你刚刚杀了一个C级监工和四个D级守卫，引起了整个7号收割区的警报。\"苏星陨指着地图上的几个红点，\"现在，至少有三支搜索队正在朝这个方向集结。你必须在20分钟内离开这里，否则就会被包围。\"</p>\n<p>楚锐看着地图，真理引擎自动分析着上面的信息。</p>\n<p>【目标：7号收割区布防图】<br>【来源：扎戈记忆碎片】<br>【可信度：95%】<br>【当前敌人分布：】<br>【- 北方：D级搜索队×2（40人）】<br>【- 东方：C级突击小队×1（12人）】<br>【- 南方：B级指挥官×1（疑似）】</p>\n<p>形势比想象中严峻。</p>\n<p>\"你知道我会引起警报？\"楚锐转头看向苏星陨，\"所以你一直在监视我？\"</p>\n<p>苏星陨没有否认。</p>\n<p>\"我一直在等待一个能够杀死扎戈的人出现。\"她说，\"扎戈是7号收割区的监察官，掌握着大量的情报和资源。只要能杀了他，就能动摇整个收割区的统治。\"</p>\n<p>\"而你做到了。\"</p>\n<p>她深紫色的眼眸中闪烁着一种奇异的光芒，\"在你的意识中，我看到了一种……前所未有的东西。那不是精神力，也不是科技，那是一种……更高维度的存在。\"</p>\n<p>\"告诉我，楚锐，你身上到底发生了什么？\"</p>\n<p>楚锐沉默了片刻。</p>\n<p>他看着眼前这个女人。她看起来瘦弱而脆弱，但在真理引擎的扫描中，她的脑域活动强度是普通人的十倍以上。那种深紫色的眼眸，似乎真的能够看穿一切伪装。</p>\n<p>\"我觉醒了一种能力。\"楚锐说，\"我把它叫做……真理引擎。\"</p>\n<p>他没有详细解释，只是简单地描述了引擎的基本功能：扫描、解析、灵魂抽取。</p>\n<p>苏星陨听完，陷入了长时间的沉默。</p>\n<p>然后，她做出了一个让楚锐意外的举动。</p>\n<p>她单膝跪地。</p>\n<p>\"楚锐，我愿意追随你。\"她说，声音中带着一种近乎狂热的坚定，\"不是为了复仇，不是为了生存，而是为了……向那些高高在上的存在证明，虫子也可以反抗神明。\"</p>\n<p>楚锐愣住了。</p>\n<p>\"你……\"他不知道该说什么。</p>\n<p>\"我是先天脑域异变者。\"苏星陨抬起头，深紫色的眼眸直视着他，\"我的精神力可以感知方圆数公里内的生命体，可以建立心灵链接，可以……潜入他人的意识。\"</p>\n<p>\"在你和扎戈战斗的时候，我感知到了你意识中的变化。那种痛苦，那种挣扎，那种……从绝望中诞生希望的勇气。\"</p>\n<p>\"我知道，你就是我一直在等待的人。\"</p>\n<p>楚锐沉默了。</p>\n<p>他看着眼前这个女人，看着她那双深紫色的眼眸，感受着她的真诚和……孤独。</p>\n<p>他们都是孤独的。在这末日废土中，每个人都是孤独的。</p>\n<p>\"起来吧。\"楚锐伸出手，\"我不需要追随者，我需要的是……同伴。\"</p>\n<p>苏星陨愣了一下，然后露出了一丝真心的笑容。</p>\n<p>她握住楚锐的手，站了起来。</p>\n<p>\"那么，同伴，让我告诉你一些你不知道的事情。\"她说，\"关于地球，关于人类，关于……这个宇宙的真实。\"</p>\n<p>她走到墙边，按下了一个隐藏的开关。墙壁缓缓移开，露出了一间密室。</p>\n<p>密室的墙壁上，贴满了各种照片、文件、和手绘的图表。最中央是一幅巨大的星图，上面标注着密密麻麻的符号和线路。</p>\n<p>\"这是什么？\"楚锐问道。</p>\n<p>\"这是我从扎戈的意识中提取出来的情报，和我这些年收集的信息拼凑而成的真相。\"苏星陨的声音变得低沉，\"楚锐，地球不是自然形成的。\"</p>\n<p>\"它是一个……培养皿。\"</p>\n<p>楚锐的瞳孔猛然收缩。</p>\n<p>\"什么意思？\"</p>\n<p>\"意思是我们都是实验品。\"苏星陨指着星图上的一颗蓝点，\"地球，被高维文明称为'第9号生物质牧场'。我们人类，是它们精心培育的'灵魂作物'。\"</p>\n<p>\"降临日不是入侵，是……收割季的开始。\"</p>\n<p>\"每隔几千年，它们就会收割一次人类的灵魂，用来作为高维文明的能源。然后它们会重置人类文明，让一切重新开始。\"</p>\n<p>\"这是第几次了？\"楚锐的声音有些干涩。</p>\n<p>\"第八次。\"苏星陨指着密室角落的一个展示柜，里面摆放着各种古老的文物，\"这是我从世界各地收集的证据。前七次文明的遗迹，被深埋在地下，被刻意抹去了历史。\"</p>\n<p>\"每次收割后，它们都会修改人类的记忆，让我们以为自己是第一次面对这一切。\"</p>\n<p>\"但这次，出了意外。\"</p>\n<p>她转过头，深紫色的眼眸直视着楚锐，目光中带着一种近乎疯狂的希望。</p>\n<p>\"你的出现，就是意外。\"</p>\n<p>\"真理引擎……那不是人类该有的东西。它来自更高维度的存在，来自……造物主本身。\"</p>\n<p>\"楚锐，你可能是打破这个循环的唯一希望。\"</p>\n<p>楚锐沉默了。</p>\n<p>他看着墙壁上的星图，看着那些标注着古老文明灭绝日期的图表，感受着体内真理引擎的运转。</p>\n<p>如果他真的是意外，如果真的有希望打破这个循环……</p>\n<p>那么，他就必须变得更强。</p>\n<p>强到足以撕裂这片天空，强到足以打碎这个培养皿，强到足以让那些高高在上的存在知道——</p>\n<p>人类，不是可以随意收割的作物。</p>\n<p>\"告诉我更多。\"楚锐说，声音中带着一种前所未有的坚定，\"告诉我关于敌人的一切，关于它们的力量体系，关于它们的弱点。\"</p>\n<p>\"我要在它们反应过来之前，变得足够强。\"</p>\n<p>\"强到让它们……恐惧。\"</p>\n<p><strong>第3章：苏星陨与废土之下的真相 · 完</strong></p>\n<hr>\n<p><strong>【本章总结】</strong></p>\n<p>- 苏星陨正式加入，成为楚锐的第一个同伴<br>- 揭示世界观核心真相：地球是第9号生物质牧场，人类被圈养收割<br>- 这是第八次文明轮回，前七次都被收割灭绝<br>- 楚锐的真理引擎来自更高维度，可能是打破循环的关键<br>- 楚锐决心变强，建立反抗势力</p>"}, {"num": 4, "title": "林珩与残酷的抉择", "content": "<h1>第4章：林珩与残酷的抉择</h1>\n<p><strong>降临日后第30天，16:00。</strong></p>\n<p><strong>04号掩体，作战会议室。</strong></p>\n<p>当楚锐和苏星陨走进会议室时，里面已经坐着三个人。</p>\n<p>为首的是一个中年男子，穿着一身破旧但整洁的军装，戴着一副金丝眼镜。他的面容冷峻，眼神锐利如刀，浑身上下散发着一种久居上位的威严。</p>\n<p>他就是林珩，04号掩体的实际掌控者，也是这片区域人类幸存者的领袖。</p>\n<p>在林珩的左手边，是一个身材魁梧的壮汉，半边脸被机械义眼取代，散发着冰冷的红光。他就是陆沉，林珩手下最强的战士。</p>\n<p>右手边是一个瘦小的老者，双手布满了老茧和油污，那是常年与机械打交道留下的痕迹。他是塔克，掩体里的首席技师。</p>\n<p>\"你就是楚锐？\"林珩开口了，声音平静却带着一种压迫感，\"杀死了扎戈的那个？\"</p>\n<p>楚锐点了点头，直视着林珩的眼睛。</p>\n<p>\"是我。\"</p>\n<p>林珩的目光在楚锐身上打量了片刻，然后缓缓说道：\"你很强。能在那么短的时间内击杀一个C级监工，说明你至少达到了Tier 0 Level 2的等级。\"</p>\n<p>\"但你也惹了大麻烦。\"</p>\n<p>他站起身，走到墙边的一幅地图前，指着上面密密麻麻的红点。</p>\n<p>\"因为你的行动，整个7号收割区进入了戒严状态。外星人的搜索队正在地毯式排查所有可能的藏身点。按照目前的进度，最多48小时，他们就会找到这里。\"</p>\n<p>\"这意味着，04号掩体的两万名幸存者，都会因为你的冲动而陪葬。\"</p>\n<p>会议室里的气氛瞬间凝固。</p>\n<p>陆沉的机械义眼发出一阵微弱的嗡鸣，那是进入战斗准备状态的信号。塔克则低下头，假装在研究手中的零件，但身体微微紧绷。</p>\n<p>楚锐没有退缩。</p>\n<p>他迎着林珩的目光，平静地说道：\"我没有冲动。我是故意要引起警报的。\"</p>\n<p>林珩挑了挑眉。</p>\n<p>\"哦？\"</p>\n<p>\"扎戈掌握着7号收割区的布防图和通讯密码。\"楚锐说，\"只有杀了他，才能获取这些情报。而我需要这些情报，来制定反击计划。\"</p>\n<p>\"反击？\"林珩冷笑一声，\"就凭你一个人，还有这两万个连武器都没有的平民，你想反击整个7号收割区的驻军？\"</p>\n<p>\"不是一个人。\"苏星陨上前一步，\"还有我。\"</p>\n<p>\"加上你们两个，也只有两个觉醒者。\"林珩摇了摇头，\"而敌人有上百个C级以上的战力，还有至少一个B级指挥官。\"</p>\n<p>\"正面交锋，胜率不足1%。\"</p>\n<p>楚锐沉默了片刻，然后问道：\"那你有什么建议？\"</p>\n<p>林珩转过身，背对着众人，目光落在地图上的一个位置。</p>\n<p>那里是7号收割区最大的灵魂提取塔，也是外星人的核心据点。</p>\n<p>\"我有一个计划。\"他说，\"但需要付出……代价。\"</p>\n<p>\"什么计划？\"</p>\n<p>\"诱饵计划。\"林珩的声音没有任何波动，仿佛在说一件微不足道的小事，\"用04号掩体作为诱饵，吸引外星人的主力部队。然后，由你和苏星陨率领精锐小队，趁机突袭提取塔，夺取里面的外星主脑核心。\"</p>\n<p>\"只要拿到主脑核心，就能瘫痪整个7号收割区的防御系统。届时，我们就可以趁机突围。\"</p>\n<p>楚锐的眉头皱了起来。</p>\n<p>\"用两万人做诱饵？\"他的声音变冷了，\"你知道这意味着什么吗？\"</p>\n<p>\"意味着他们中的大部分人都会死。\"林珩转过头，面无表情地看着楚锐，\"但如果成功，至少能救出一两千人。如果不这么做，48小时后，两万人全部都会死。\"</p>\n<p>\"这是唯一的生机。\"</p>\n<p>\"不，还有另一个选择。\"楚锐说。</p>\n<p>\"什么？\"</p>\n<p>\"我和你一起留下来做诱饵。\"楚锐说，\"让苏星陨带精锐去突袭提取塔。\"</p>\n<p>林珩愣了一下。</p>\n<p>他没想到楚锐会提出这样的建议。</p>\n<p>\"你……愿意留下来送死？\"</p>\n<p>\"不是送死。\"楚锐的嘴角勾起一丝冷笑，\"是猎杀。\"</p>\n<p>\"既然要做诱饵，就要做得足够逼真。有足够分量的诱饵，才能钓到大鱼。\"</p>\n<p>\"而我，就是那个诱饵。\"</p>\n<p>他看向林珩，目光中燃烧着一种疯狂的火焰。</p>\n<p>\"林珩，我知道你在试探我。你在试探我是否值得信任，试探我是否愿意为了大局牺牲。\"</p>\n<p>\"现在，你得到答案了。\"</p>\n<p>林珩沉默了。</p>\n<p>他看着眼前这个年轻人，看着他眼中那种不顾一切的疯狂，看着他身上散发出的那种……令人心悸的戾气。</p>\n<p>良久，他缓缓点了点头。</p>\n<p>\"好。\"他说，\"那么，我们就来制定一个……让外星人也感到恐惧的计划。\"</p>\n<p><strong>第4章：林珩与残酷的抉择 · 完</strong></p>\n<hr>\n<p><strong>【本章总结】</strong></p>\n<p>- 林珩正式登场，展现冷酷理性的人设<br>- 提出残酷的诱饵计划，试探楚锐<br>- 楚锐选择留下来做诱饵，证明了自己的决心和价值<br>- 双方达成初步合作，开始制定反击计划<br>- 伏笔：林珩开始认可楚锐，但理念分歧初现</p>"}, {"num": 5, "title": "星火初燃", "content": "<h1>第5章：星火初燃</h1>\n<p><strong>降临日后第31天，04:00。</strong></p>\n<p><strong>04号掩体，黎明前的黑暗。</strong></p>\n<p>这是人类历史上最黑暗的时刻，却也是希望开始萌芽的时刻。</p>\n<p>在楚锐和林珩的共同决策下，一个代号为\"星火\"的计划开始实施。这个计划的目标只有一个——</p>\n<p>让外星人为之恐惧。</p>\n<p>\"首先，我们需要武器。\"楚锐站在掩体的中央广场上，面前是一群衣衫褴褛但眼神逐渐坚定的幸存者。</p>\n<p>这些人都是自愿加入战斗的。在得知了地球真相之后，他们中的大多数人选择了不再做待宰的羔羊。</p>\n<p>即使要死，也要死在战斗的路上。</p>\n<p>\"我们没有外星人的高科技，但我们有智慧，有双手，有……这个。\"</p>\n<p>楚锐举起手中的一块金属残骸。那是从扎戈身上剥离的外骨骼碎片，在真理引擎的解析下，它的分子结构已经被完全掌握。</p>\n<p>【目标：扎尔贡外骨骼碎片（C级材料）】<br>【成分：甲壳质+生物陶瓷复合物】<br>【硬度：莫氏7.5级】<br>【可利用性：高】<br>【降维推演：可利用废土高浓度辐射废料+废钢+生物质粘合剂，手工锻造D级合金】</p>\n<p>\"塔克，你能做到吗？\"楚锐看向那个瘦小的老者。</p>\n<p>塔克接过碎片，用他那双布满老茧的手仔细摩挲着，眼中闪烁着狂热的光芒。</p>\n<p>\"给我足够的废钢和辐射废料，给我三天时间，我给你造出能砍死外星杂种的刀！\"他沙哑着嗓子说道。</p>\n<p>\"好。\"楚锐点了点头，\"那么，第一支武装小队，将在三天后成立。\"</p>\n<p>\"这支小队的名字……就叫'星火'。\"</p>\n<p>\"星星之火，可以燎原。\"</p>\n<hr>\n<p>接下来的三天，是整个04号掩体历史上最忙碌也最热血的三天。</p>\n<p>塔克带着他的技工团队，夜以继日地改造着废土上搜集来的各种材料。在楚锐的【降维推演】指导下，他们成功锻造出了一种被命名为\"废土钢\"的合金。</p>\n<p>这种合金虽然比不上外星人的C级材料，但足以对D级守卫造成致命伤害。</p>\n<p>第一批一百把\"废土钢\"震荡刀被打造出来，分发给了第一批\"星火\"战士。</p>\n<p>与此同时，苏星陨开始训练一支特殊的小队——\"灵能者\"。</p>\n<p>这些都是在降临日后觉醒精神力的普通人。虽然他们的能力远不如苏星陨强大，但在她的指导下，他们学会了基础的感知、通讯和心灵干扰。</p>\n<p>\"你们不需要像楚锐那样正面战斗。\"苏星陨对这群灵能者说，\"你们的任务，是成为战场上的眼睛和耳朵。\"</p>\n<p>\"感知敌人的位置，干扰敌人的通讯，在关键时刻，给敌人制造幻觉和恐惧。\"</p>\n<p>\"记住，精神力的最高境界，不是摧毁，而是……支配。\"</p>\n<p>而林珩，则负责整个作战计划的统筹和战术设计。</p>\n<p>他用他那冷酷而精准的头脑，设计出了一个被命名为\"围猎\"的作战方案。</p>\n<p>\"外星人的弱点在于傲慢。\"林珩在作战地图上比划着，\"它们把我们当成低等生物，当成可以随意屠杀的牲畜。\"</p>\n<p>\"我们要利用这种傲慢。\"</p>\n<p>\"当它们以为我们在逃跑的时候，我们其实在埋伏。\"</p>\n<p>\"当它们以为我们在求饶的时候，我们其实在准备反击。\"</p>\n<p>\"我们要让它们知道，猎物……也会咬人。\"</p>\n<hr>\n<p><strong>降临日后第34天，12:00。</strong></p>\n<p><strong>7号收割区，废土地带。</strong></p>\n<p>第一支\"星火\"武装小队，迎来了他们的首战。</p>\n<p>目标是两支落单的D级搜索队，共20人。</p>\n<p>楚锐站在废墟的制高点，手中握着那把已经被他重新锻造过的高频震荡刃。在塔克的改良下，这把刀的振动频率提升了30%，威力足以切开C级守卫的外骨骼。</p>\n<p>\"目标距离500米，正在朝3号区域移动。\"苏星陨的声音在他脑海中响起，那是通过心灵链接建立的直接通讯。</p>\n<p>\"收到。\"楚锐回复道，\"各小队就位，等我信号。\"</p>\n<p>他深吸一口气，感受着体内流淌的力量。</p>\n<p>【当前状态】<br>【等级：Tier 0 Level 3】<br>【生物电能：100%】<br>【已解锁能力：灵魂抽取、基础扫描、肉体强化、废料重构（初级）】</p>\n<p>经过三天的疯狂猎杀和吞噬，他已经突破到了Tier 0 Level 3，解锁了新的能力【废料重构】——可以将废土上的各种垃圾材料临时重构成可用的武器或工具。</p>\n<p>\"为了楚芸。\"他轻声说道，\"为了所有死去的人。\"</p>\n<p>\"行动！\"</p>\n<p>一声令下，埋伏在废墟中的\"星火\"战士们如同幽灵般涌出，从四面八方包围了那两支毫无防备的搜索队。</p>\n<p>战斗在瞬间爆发，又在瞬间结束。</p>\n<p>20个D级守卫，在不到5分钟内全部变成了尸体。</p>\n<p>\"星火\"战士们浑身是血，但眼中燃烧着前所未有的光芒。</p>\n<p>他们赢了。</p>\n<p>这是人类在降临日后，第一次真正意义上的胜利。</p>\n<p>楚锐站在尸堆中央，高举着手中的震荡刃，发出了一声震天的长啸。</p>\n<p>\"从今天起，我们不再是猎物！\"</p>\n<p>\"我们是……猎人！\"</p>\n<p><strong>第5章：星火初燃 · 完</strong></p>\n<hr>\n<p><strong>【本章总结】</strong></p>\n<p>- 楚锐和林珩合作建立\"星火\"反抗军<br>- 塔克打造出第一批\"废土钢\"武器<br>- 苏星陨训练灵能者小队<br>- 第一支星火武装小队成立<br>- 首战告捷，人类第一次击败外星搜索队<br>- 楚锐突破至Tier 0 Level 3，解锁【废料重构】</p>"}, {"num": 6, "title": "猎人与陷阱", "content": "<h1>第6章：猎人与陷阱</h1>\n<p><strong>降临日后第35天。</strong></p>\n<p><strong>7号收割区，废弃工厂。</strong></p>\n<p>胜利的喜悦是短暂的。</p>\n<p>当楚锐带领星火小队返回04号掩体时，等待他们的是林珩凝重的面容。</p>\n<p>\"我们被盯上了。\"林珩直截了当地说，\"刚才的伏击，引来了更大的鱼。\"</p>\n<p>他指着地图上的一个位置，那里标注着一个醒目的红点。</p>\n<p>\"B级指挥官，奥莱克。\"</p>\n<p>\"它是7号收割区的实际掌控者，仅次于总督的存在。它的实力，至少是扎戈的十倍以上。\"</p>\n<p>楚锐皱起了眉头。</p>\n<p>【目标：奥莱克（扎尔贡高级指挥官）】<br>【威胁等级：B级】<br>【预估战力：相当于Tier 0 Level 9或Tier 1 Level 3】<br>【当前状态：正在朝04号掩体方向移动，预计6小时后到达】</p>\n<p>【警告：以宿主当前实力，正面交锋胜率低于5%】</p>\n<p>5%。</p>\n<p>几乎必死的局面。</p>\n<p>\"我们撤。\"楚锐当机立断，\"所有人，带上能带的东西，立刻撤离04号掩体。\"</p>\n<p>\"往哪里撤？\"有人问道。</p>\n<p>楚锐看向地图，目光落在了一个位置上。</p>\n<p>\"太平洋底。\"</p>\n<p>\"外星人在那里建造了一座行星发动机，意图将地球拖走作为矿星。那里防御严密，但……也是它们最想不到我们会去的地方。\"</p>\n<p>\"最危险的地方，就是最安全的地方。\"</p>\n<p>林珩点了点头。</p>\n<p>\"好。我带队掩护，你带主力突围。\"</p>\n<p>\"不。\"楚锐摇了摇头，\"你带主力突围，我带精锐小队断后。\"</p>\n<p>\"楚锐——\"</p>\n<p>\"这是命令。\"楚锐打断了他，声音中带着一种不容置疑的威严，\"我是星火的领袖，我有责任保护我的同伴。\"</p>\n<p>\"而你，林珩，你是人类的统帅，你必须活下去。\"</p>\n<p>林珩沉默了。</p>\n<p>他看着眼前这个年轻人，看着他那双燃烧着火焰的眼睛，突然有一种感觉——</p>\n<p>这个人，真的能够带领人类走出黑暗。</p>\n<p>\"好。\"他说，\"但你必须答应我一件事。\"</p>\n<p>\"什么事？\"</p>\n<p>\"活着回来。\"</p>\n<p>楚锐微微一笑，那笑容中带着一种让人心安的力量。</p>\n<p>\"放心。\"他说，\"我还没杀够呢。\"</p>\n<hr>\n<p><strong>6小时后。</strong></p>\n<p><strong>04号掩体外围，废墟地带。</strong></p>\n<p>楚锐带着一支由30人组成的精锐小队，埋伏在废墟的阴影中。</p>\n<p>他们每个人都穿着由塔克特制的\"废土钢\"轻型装甲，手持改良版震荡刃，腰间挂满了辐射手雷。</p>\n<p>这是他们全部的家底，也是他们最后的希望。</p>\n<p>\"来了。\"苏星陨的声音在楚锐脑海中响起，\"东南方向，距离3公里，数量……50人以上。\"</p>\n<p>\"其中有4个C级，1个B级。\"</p>\n<p>楚锐深吸一口气，握紧了手中的震荡刃。</p>\n<p>【目标：奥莱克率领的追击部队】<br>【兵力：D级×45，C级×4，B级×1】<br>【战术建议：利用废墟地形进行游击，优先消耗D级兵力，避免与B级正面接触】</p>\n<p>【警告：B级指挥官拥有区域性精神压制能力，请小心】</p>\n<p>精神压制？</p>\n<p>楚锐转头看向苏星陨。</p>\n<p>\"你能对抗它的精神压制吗？\"</p>\n<p>苏星陨深紫色的眼眸中闪过一丝凝重。</p>\n<p>\"可以试试。\"她说，\"但只能维持很短的时间。\"</p>\n<p>\"足够了。\"楚锐说，\"你只需要给我争取30秒。\"</p>\n<p>\"30秒，我就能杀到它面前。\"</p>\n<p>苏星陨点了点头，闭上了眼睛。</p>\n<p>她的精神力开始扩散，在废墟上空编织成一张无形的大网，等待着猎物的到来。</p>\n<hr>\n<p>十分钟后，外星部队进入了伏击圈。</p>\n<p>为首的，是一个比扎戈还要高大魁梧的身影。它的外骨骼呈现出一种暗金色的光泽，每一步踏出，都会在地面上留下一个深深的脚印。</p>\n<p>这就是B级指挥官，奥莱克。</p>\n<p>\"停。\"奥莱克突然抬起手，示意部队停止前进。</p>\n<p>它六只复眼扫视着周围的废墟，似乎察觉到了什么。</p>\n<p>\"有埋伏。\"它冷冷地说道，\"出来吧，虫子们。我知道你们在那里。\"</p>\n<p>没有回应。</p>\n<p>只有风吹过废墟的呜咽声。</p>\n<p>\"哼，不见棺材不落泪。\"奥莱克冷笑一声，然后——</p>\n<p>【精神压制】发动。</p>\n<p>一股无形的精神波动瞬间扩散开来，笼罩了整个废墟区域。</p>\n<p>埋伏在阴影中的星火战士们顿时感觉脑袋像是被重锤击中，视野开始模糊，四肢变得沉重。</p>\n<p>\"就是现在！\"楚锐大吼。</p>\n<p>苏星陨猛然睁开眼睛，深紫色的眼眸中爆发出耀眼的光芒。</p>\n<p>【心灵屏障】全开！</p>\n<p>两股精神力在空中碰撞，发出一声只有精神力者才能听见的巨响。</p>\n<p>苏星陨闷哼一声，嘴角溢出一丝鲜血，但她咬紧牙关，死死地支撑着那道屏障。</p>\n<p>\"楚锐，快！\"</p>\n<p>楚锐没有犹豫。</p>\n<p>他的身体如同离弦之箭般射出，在肉体强化的加持下，他的速度快到了极致，甚至在空气中留下了一道淡淡的残影。</p>\n<p>【灵魂抽取】发动！</p>\n<p>目标是……奥莱克身边的四个C级护卫！</p>\n<p>在苏星陨的心灵屏障保护下，奥莱克的精神压制被暂时抵消，那四个C级护卫完全没有反应过来，就被楚锐一一近身，灵魂被强行抽离。</p>\n<p>【灵魂抽取成功×4】<br>【获得灵魂能量：中等×4】<br>【生物电能恢复至100%】<br>【检测到生物电能溢出……】<br>【是否尝试突破？】</p>\n<p>\"突破！\"</p>\n<p>【等级突破开始……】</p>\n<p>剧痛再次席卷全身，但楚锐咬紧牙关，强忍着痛苦，继续冲向奥莱克。</p>\n<p>他的等级在战斗中突破，从Tier 0 Level 3直接跃升到了……</p>\n<p>【突破成功！】<br>【当前等级：Tier 0 Level 5】<br>【解锁能力：动能感知（初级）——可预判敌方攻击轨迹】</p>\n<p>奥莱克终于反应了过来。</p>\n<p>它发出一声愤怒的咆哮，暗金色的外骨骼上亮起了密密麻麻的能量纹路，一拳朝着楚锐轰来。</p>\n<p>那一拳的力量，足以粉碎一辆坦克。</p>\n<p>但楚锐已经预判到了。</p>\n<p>【动能感知】发动！</p>\n<p>在他的视野中，奥莱克拳头的轨迹被清晰地标记出来，就像是一条红色的箭头。</p>\n<p>他提前0.5秒做出了规避动作，身体以一种不可思议的角度扭曲，险之又险地避开了那一拳。</p>\n<p>然后，他的震荡刃，刺向了奥莱克的胸口。</p>\n<p>铛！</p>\n<p>刀刃与暗金色外骨骼碰撞，发出一声刺耳的金属摩擦声。</p>\n<p>没有刺进去。</p>\n<p>B级的外骨骼，硬度远超C级。</p>\n<p>\"愚蠢。\"奥莱克冷笑，\"就凭这种武器，也想伤到我？\"</p>\n<p>它另一只手如闪电般探出，死死地抓住了楚锐的脖子，将他提了起来。</p>\n<p>\"你以为杀了我的几个手下，就能挑战我？\"</p>\n<p>\"愚蠢的虫子，我会让你知道，什么叫做……绝望。\"</p>\n<p>它开始收紧手指。</p>\n<p>楚锐感觉自己的颈骨在发出不堪重负的呻吟，视野开始发黑。</p>\n<p>但他没有恐惧。</p>\n<p>他的嘴角，反而勾起了一丝笑容。</p>\n<p>\"你上当了。\"</p>\n<p>奥莱克一愣。</p>\n<p>下一秒，它感觉到了。</p>\n<p>在它的脚下，废墟的深处，传来了一阵剧烈的震动。</p>\n<p>那是……</p>\n<p>\"引爆！\"楚锐用尽最后的力气大吼。</p>\n<p>轰！！！</p>\n<p>预先埋在废墟下的高浓度辐射废料炸弹，同时爆炸了。</p>\n<p>那是楚锐用【废料重构】能力制造的临时炸弹，威力足以摧毁一座大楼。</p>\n<p>奥莱克被爆炸的冲击波吞没了。</p>\n<p>而楚锐，在爆炸的前一刻，被一道紫色的光芒包裹，瞬间传送到了百米之外。</p>\n<p>那是苏星陨用尽全部精神力发动的【紧急传送】。</p>\n<p>她倒在地上，脸色苍白如纸，已经失去了意识。</p>\n<p>但她的嘴角，却带着一丝满足的微笑。</p>\n<p>因为他们赢了。</p>\n<p>废墟的烟尘中，奥莱克那暗金色的身影摇摇欲坠。</p>\n<p>它的外骨骼被炸得支离破碎，绿色的血液从伤口中不断涌出。</p>\n<p>它还没有死，但已经重伤。</p>\n<p>楚锐捡起掉在地上的震荡刃，一步一步走向它。</p>\n<p>\"你……\"奥莱克看着他，复眼中第一次出现了恐惧，\"你到底是谁？\"</p>\n<p>楚锐站在它面前，高举着手中的刀。</p>\n<p>\"我是楚锐。\"他说，\"星火反抗军的领袖。\"</p>\n<p>\"也是……你们的噩梦。\"</p>\n<p>刀光落下。</p>\n<p>【灵魂抽取】！</p>\n<p>这一次，是一团前所未有的巨大蓝色光团，那是B级强者的灵魂，蕴含着惊人的能量。</p>\n<p>楚锐将它吞噬，感受着体内力量的暴涨。</p>\n<p>【灵魂抽取成功】<br>【获得灵魂能量：大量】<br>【获得记忆碎片：7号收割区完整布防图、总督府内部结构、行星发动机核心位置】<br>【等级提升：Tier 0 Level 5 → Tier 0 Level 7】</p>\n<p>【当前等级：Tier 0 Level 7】</p>\n<p>距离Tier 1，只有一步之遥。</p>\n<p>楚锐抱起昏迷的苏星陨，转身看向身后幸存的星火战士们。</p>\n<p>\"我们走。\"他说，\"去太平洋，去行星发动机。\"</p>\n<p>\"在那里，我们将点燃……燎原之火。\"</p>\n<p><strong>第6章：猎人与陷阱 · 完</strong></p>\n<hr>\n<p><strong>【本章总结】</strong></p>\n<p>- B级指挥官奥莱克登场，带来巨大压力<br>- 楚锐和苏星陨配合，设下陷阱伏击<br>- 战斗中突破至Tier 0 Level 5，解锁【动能感知】<br>- 击杀奥莱克，吞噬B级灵魂，等级跃升至Tier 0 Level 7<br>- 获得重要情报：总督府结构、行星发动机位置<br>- 苏星陨为救楚锐耗尽精神力昏迷<br>- 星火小队向太平洋行星发动机转移</p>"}, {"num": 7, "title": "深海之下", "content": "<h1>第7章：深海之下</h1>\n<p><strong>降临日后第38天。</strong></p>\n<p><strong>太平洋，马里亚纳海沟。</strong></p>\n<p>楚锐站在一艘由塔克临时拼凑而成的深海潜艇\"斩浪号\"的舰桥上，透过厚重的观察窗，看着外面那片永恒的黑暗。</p>\n<p>这里是地球上最深的海沟，深度超过11000米。巨大的水压足以将普通的潜水器压成铁饼，但对于\"斩浪号\"来说，这只是一次普通的下潜。</p>\n<p>因为\"斩浪号\"的外壳，是用奥莱克的暗金色外骨骼碎片加固过的。</p>\n<p>\"距离目标还有500米。\"塔克的声音从通讯器中传来，\"前方检测到强烈的能量反应，应该是行星发动机的核心区域。\"</p>\n<p>楚锐点了点头，转头看向身边的苏星陨。</p>\n<p>经过三天的休养，她的精神力已经恢复了大半，但脸色依然有些苍白。</p>\n<p>\"你还好吗？\"楚锐问道。</p>\n<p>\"没事。\"苏星陨微微一笑，\"只是……有点紧张。\"</p>\n<p>这是他们第一次面对如此庞大的外星设施。</p>\n<p>行星发动机，那是二级文明的科技产物，是可以推动一颗行星在宇宙中航行的超级工程。以人类目前的科技水平，连理解它的原理都做不到，更别说对抗它了。</p>\n<p>但楚锐有信心。</p>\n<p>因为他有真理引擎。</p>\n<p>只要有足够的时间，他就能解析任何科技，然后将它变成自己的力量。</p>\n<p>\"准备对接。\"楚锐下令，\"记住，我们的目标不是摧毁发动机，而是夺取它的控制权。\"</p>\n<p>\"只要控制了发动机，我们就有了一个可以与外星人谈判的筹码。\"</p>\n<hr>\n<p><strong>30分钟后。</strong></p>\n<p>\"斩浪号\"成功对接上了行星发动机的外围维护通道。</p>\n<p>楚锐带领着一支由20人组成的精锐小队，穿着深海作战服，小心翼翼地进入了这座沉睡在深海之下的钢铁巨兽。</p>\n<p>发动机内部的景象，让所有人都倒吸了一口凉气。</p>\n<p>那是一座城市。一座完全由金属和能量构成的城市。</p>\n<p>巨大的管道如同血管般纵横交错，输送着某种发出幽蓝色光芒的高能液体。无数的机器人在管道之间穿梭，进行着维护和检修工作。</p>\n<p>而在城市的最中央，是一座通天彻地的巨塔——</p>\n<p>那就是发动机的核心，\"星核\"。</p>\n<p>\"检测到强烈的精神干扰……\"苏星陨突然捂住脑袋，脸上露出痛苦的表情，\"有什么东西……在扫描我们……\"</p>\n<p>楚锐心中一凛。</p>\n<p>【警告：检测到B级以上精神波动】<br>【来源：星核深处】<br>【威胁等级：极高】<br>【建议：立即撤离】</p>\n<p>但已经太迟了。</p>\n<p>一个声音突然在他们的脑海中响起，那不是任何一种语言，而是一种纯粹的、冰冷的信息流——</p>\n<p>【检测到入侵者】<br>【身份：人类（第9号生物质牧场）】<br>【威胁等级：D级】<br>【处理方案：清除】</p>\n<p>下一秒，整个发动机内部响起了刺耳的警报声。</p>\n<p>无数的机器人停止了工作，红色的光学传感器同时转向了楚锐他们的方向。</p>\n<p>\"被发现了！\"有人惊恐地喊道。</p>\n<p>\"准备战斗！\"楚锐大吼，\"苏星陨，建立心灵链接，保持通讯！其他人，背靠背，不要分散！\"</p>\n<p>机器人的潮水涌来了。</p>\n<p>它们没有武器，它们本身就是武器——它们的身体由高强度的合金构成，每一拳每一脚都带着足以粉碎骨骼的力量。</p>\n<p>楚锐冲在最前面，肉体强化全开，震荡刃在空中划出一道道银色的弧线。</p>\n<p>每一个被刀刃触及的机器人，都会在瞬间被斩断、被摧毁。</p>\n<p>但机器人的数量太多了。</p>\n<p>杀了一个，上来十个。</p>\n<p>杀了十个，上来一百个。</p>\n<p>它们仿佛无穷无尽，从四面八方涌来，将楚锐他们团团包围。</p>\n<p>\"这样下去不行！\"苏星陨在心灵链接中大喊，\"它们是被中央主脑控制的，只要主脑还在，它们就永远不会停止！\"</p>\n<p>\"我去主脑那里！\"楚锐做出了决定。</p>\n<p>\"太危险了！\"苏星陨反对，\"那里至少有A级的防御力量！\"</p>\n<p>\"我知道。\"楚锐说，\"但这是唯一的办法。\"</p>\n<p>\"相信我。\"</p>\n<p>他说完，不等苏星陨回应，就启动了【肉体强化】的最高功率，整个人如同一颗炮弹般冲了出去。</p>\n<p>他的目标是星核。</p>\n<p>那里有发动机的中央主脑，也有……他突破的契机。</p>\n<hr>\n<p><strong>星核深处，主控室。</strong></p>\n<p>楚锐浑身是血地站在了主控室的门前。</p>\n<p>他身后是一条由机器人残骸铺成的血路。</p>\n<p>他的身体已经到达了极限，多处骨折，内脏破裂，生物电能只剩下不到10%。</p>\n<p>但他的眼神依然燃烧着火焰。</p>\n<p>因为他终于看到了。</p>\n<p>看到了主控室中央那个巨大的、发出幽蓝色光芒的球体——</p>\n<p>那就是行星发动机的中央主脑，一个由纯粹能量构成的超级计算机。</p>\n<p>而在主脑旁边，站着一个身影。</p>\n<p>那不是机器人，也不是扎尔贡人。</p>\n<p>那是一个……人类。</p>\n<p>或者说，曾经是人类。</p>\n<p>他的身体有一半被替换成了机械，另一半则呈现出一种诡异的晶体化状态。他的眼睛没有瞳孔，只有一片纯粹的白光。</p>\n<p>\"你就是楚锐？\"那个\"人\"开口了，声音机械而冰冷，\"我等你很久了。\"</p>\n<p>\"你是谁？\"楚锐握紧了震荡刃。</p>\n<p>\"我是'牧羊人'的使者，也是这座发动机的……守护者。\"那个\"人\"说，\"你可以叫我……降世者。\"</p>\n<p>\"投降吧，楚锐。你的挣扎是毫无意义的。\"</p>\n<p>\"人类的命运，从出生那一刻起，就已经注定了。\"</p>\n<p>楚锐冷笑一声。</p>\n<p>\"命运？\"他说，\"我的命运，由我自己决定。\"</p>\n<p>\"而你们的命运……由我决定。\"</p>\n<p>【灵魂抽取】发动！</p>\n<p>目标——中央主脑！</p>\n<p>降世者显然没有料到楚锐会直接对主脑下手，等他反应过来时，楚锐的手已经触碰到了那个幽蓝色的球体。</p>\n<p>【解析开始……】</p>\n<p>【目标：行星发动机中央主脑（A级科技）】<br>【复杂度：极高】<br>【解析时间：未知】<br>【警告：解析过程中宿主将承受巨大精神压力】</p>\n<p>剧痛。</p>\n<p>比之前任何一次都要剧烈的剧痛。</p>\n<p>楚锐感觉自己的大脑像是要被撕裂成碎片，无数的信息流涌入他的意识，那是A级科技的庞大知识体系，远远超出了人类能够承受的极限。</p>\n<p>他的身体开始崩溃，皮肤开裂，鲜血四溅。</p>\n<p>但他没有松手。</p>\n<p>\"给我……破！！！\"</p>\n<p>他用尽全部的意志力，强行推动着真理引擎的运转。</p>\n<p>时间仿佛静止了。</p>\n<p>然后——</p>\n<p>【解析完成！】</p>\n<p>【获得技术碎片：行星发动机控制系统（A级）】<br>【解锁能力：能量潮汐（初级）——可操控局部能量流动】<br>【等级突破：Tier 0 Level 7 → Tier 1 Level 1】</p>\n<p>【恭喜宿主，突破至 Tier 1】</p>\n<p>【获得 Tier 1 标志性能力：能量转化】</p>\n<p>楚锐睁开眼睛，瞳孔已经变成了纯粹的淡金色。</p>\n<p>他看向降世者，嘴角勾起了一丝冷笑。</p>\n<p>\"现在，该轮到你了。\"</p>\n<p><strong>第7章：深海之下 · 完</strong></p>\n<hr>\n<p><strong>【本章总结】</strong></p>\n<p>- 潜入太平洋底的行星发动机<br>- 遭遇\"降世者\"——半机械半能量化的改造人类<br>- 楚锐以濒死为代价，强行解析A级主脑<br>- 突破至 Tier 1 Level 1，正式跨入星际文明等级<br>- 解锁【能量潮汐】和【能量转化】能力<br>- 获得行星发动机控制权</p>"}, {"num": 8, "title": "燎原", "content": "<h1>第8章：燎原</h1>\n<p><strong>降临日后第40天。</strong></p>\n<p><strong>7号收割区，天空。</strong></p>\n<p>巨大的天穹采收塔依然在运转，但在它下方的地球上，一些事情已经悄然改变。</p>\n<p>楚锐站在太平洋海面的一座浮岛上，身后是已经改造成移动要塞的\"斩浪号\"，以及……数以万计的幸存者。</p>\n<p>在控制行星发动机后，他利用发动机的能源，启动了 buried deep in the ocean floor 的古老传送网络，将散落在世界各地的幸存者聚集地连接了起来。</p>\n<p>现在，他手中掌握的，不再是一支几十人的小队，而是一支……军队。</p>\n<p>一支由五万名觉醒者和幸存者组成的，名为\"星火\"的反抗军。</p>\n<p>\"总督发来了通讯请求。\"苏星陨走到他身边，递过来一个通讯器。</p>\n<p>楚锐接过通讯器，屏幕上出现了一个身影——</p>\n<p>硅基总督，7号收割区的最高统治者，一个将身体完全能量化的恐怖存在。</p>\n<p>\"楚锐。\"总督的声音直接在空气中震动，带着一种金属的质感，\"我不得不承认，我低估了你。\"</p>\n<p>\"你在短短十天内，从一个普通的灵魂电池，变成了能够控制行星发动机的威胁。这种进化速度，即使在宇宙中，也是极其罕见的。\"</p>\n<p>\"所以，我给你一个选择。\"</p>\n<p>\"投降，加入我，成为我的副手。我可以赐予你永恒的生命，无尽的力量，以及……半个地球的生杀大权。\"</p>\n<p>楚锐静静地听完，然后笑了。</p>\n<p>\"总督，你也低估了一样东西。\"</p>\n<p>\"什么？\"</p>\n<p>\"人类的骄傲。\"</p>\n<p>楚锐抬起头，看着天空中那座遮天蔽日的天穹采收塔，声音平静却充满了力量。</p>\n<p>\"我们是人，不是牲畜。我们有尊严，有自由，有……反抗的权利。\"</p>\n<p>\"你想让我做你的狗？\"</p>\n<p>\"抱歉，我更喜欢……做猎人。\"</p>\n<p>他按下了手中的一个按钮。</p>\n<p>那是行星发动机的启动键。</p>\n<p>【行星发动机启动】<br>【目标：天穹采收塔】<br>【能量输出：100%】</p>\n<p>一道通天彻地的蓝色光柱，从太平洋海底冲天而起，直直地轰向了天空中的天穹采收塔。</p>\n<p>那是足以推动一颗行星的恐怖能量。</p>\n<p>即使是外星人的科技，也无法承受这种级别的攻击。</p>\n<p>天穹采收塔在光柱中剧烈颤抖，发出不堪重负的呻吟，然后在所有人震惊的目光中……</p>\n<p>爆炸了。</p>\n<p>巨大的火球照亮了整个天空，如同第二颗太阳升起。</p>\n<p>那是人类在降临日后，第一次真正伤害到了外星人。</p>\n<p>\"不——！！！\"总督发出一声愤怒的咆哮，它的能量身体在空中扭曲、变形，\"你竟敢——你竟敢——！！！\"</p>\n<p>\"我会让你付出代价的，楚锐！我要让你亲眼看着，你所保护的一切，在你面前化为灰烬！\"</p>\n<p>它的身影消失在空气中，但威胁的余音依然回荡。</p>\n<p>楚锐知道，这只是一个开始。</p>\n<p>摧毁了一座采收塔，只是给外星人造成了一些损失，远不足以动摇它们的根基。</p>\n<p>真正的战争，才刚刚开始。</p>\n<p>但他不害怕。</p>\n<p>因为他已经点燃了星火。</p>\n<p>而这星火，终将燎原。</p>\n<p><strong>第8章：燎原 · 完</strong></p>"}, {"num": 9, "title": "牺牲与誓言", "content": "<h1>第9章：牺牲与誓言</h1>\n<p><strong>降临日后第45天。</strong></p>\n<p><strong>7号收割区，废弃都市。</strong></p>\n<p>摧毁天穹采收塔的代价，比楚锐想象的更加惨重。</p>\n<p>总督的报复来得又快又狠。三支由B级指挥官率领的围剿部队，同时对星火的三个据点发动了攻击。</p>\n<p>楚锐带领主力迎战其中一支，但另外两支……他没有足够的人手去救援。</p>\n<p>当他带着满身鲜血和疲惫，赶到其中一个据点时，看到的只有一片焦土。</p>\n<p>据点里的三千名幸存者，包括五百名星火战士，全部遇难。</p>\n<p>他们的尸体被悬挂在废墟的残垣断壁上，像是一面面惨白的旗帜，在寒风中摇曳。</p>\n<p>楚锐站在尸堆前，久久无言。</p>\n<p>苏星陨走到他身边，想要安慰他，但发现自己不知道该说什么。</p>\n<p>\"是我害死了他们。\"楚锐的声音沙哑，\"如果我没有摧毁采收塔，如果没有激怒总督，他们就不会死。\"</p>\n<p>\"不。\"一个虚弱的声音从身后传来。</p>\n<p>楚锐转过身，看到了一个浑身是血的身影——那是从另一场战斗中幸存下来的陆沉。</p>\n<p>他的左臂已经不见了，断口处用烧焦的布条胡乱包扎着，但眼神依然坚定。</p>\n<p>\"首领，你没有害死任何人。\"陆沉挣扎着说道，\"是外星人害死了他们。是这场战争害死了他们。\"</p>\n<p>\"他们选择加入星火，就知道会有这一天。\"</p>\n<p>\"但他们不后悔。因为他们知道，他们的死，是为了让更多人能够活下去。\"</p>\n<p>陆沉走到那些尸体前，用仅剩的右手，向它们敬了一个军礼。</p>\n<p>\"兄弟们，走好。\"他说，\"你们的血，不会白流。\"</p>\n<p>楚锐看着这一幕，感觉有什么东西在胸口燃烧。</p>\n<p>那是愤怒，也是悲伤，更是一种……责任。</p>\n<p>他走到尸堆前，缓缓跪了下来。</p>\n<p>\"我，楚锐，在此立誓。\"他的声音不高，但每一个字都像是从牙缝里挤出来的，带着金石般的坚硬，\"我将带领人类，挣脱这片牢笼。\"</p>\n<p>\"我将让那些高高在上的存在，为它们的傲慢付出代价。\"</p>\n<p>\"如果这需要我付出生命，我愿意。\"</p>\n<p>\"如果这需要我付出灵魂，我愿意。\"</p>\n<p>\"如果这需要我付出人性……\"</p>\n<p>他停顿了一下，转头看向苏星陨，目光中闪过一丝复杂的情绪。</p>\n<p>\"我也愿意。\"</p>\n<p>苏星陨的心猛地一颤。</p>\n<p>她感觉到了，楚锐正在做出一个可怕的决定。</p>\n<p>一个可能会让他永远失去自我的决定。</p>\n<p>\"楚锐……\"她想要阻止他，但不知道该说什么。</p>\n<p>楚锐站起身，转身看向身后幸存的战士们。</p>\n<p>\"传令下去。\"他说，\"全军撤退，向地下转移。\"</p>\n<p>\"我们要建立一个新的基地，一个总督找不到的基地。\"</p>\n<p>\"在那里，我们将积蓄力量，等待时机。\"</p>\n<p>\"终有一天，我们将反攻。\"</p>\n<p>\"而那一天，不会太遥远。\"</p>\n<p><strong>第9章：牺牲与誓言 · 完</strong></p>"}, {"num": 10, "title": "破晓", "content": "<h1>第10章：破晓</h1>\n<p><strong>降临日后第60天。</strong></p>\n<p><strong>地下1000米，新04号基地。</strong></p>\n<p>经过十五天的建设，新的基地终于初具规模。</p>\n<p>这是一座建立在废弃矿脉深处的地下城，深达地下一千米，即使是外星人的扫描设备，也难以发现它的存在。</p>\n<p>在这里，星火反抗军开始了艰难的重建。</p>\n<p>楚锐站在基地的最高处，俯瞰着下方忙碌的幸存者们。</p>\n<p>他们中有老人，有孩子，有残疾人。他们在建造房屋，在种植蘑菇，在修理武器，在教导下一代识字。</p>\n<p>他们的脸上，依然带着战争留下的创伤和疲惫，但也多了一丝……希望。</p>\n<p>那是楚锐给他们的希望。</p>\n<p>\"在想什么？\"苏星陨走到他身边，递过来一杯热水。</p>\n<p>\"在想未来。\"楚锐接过水杯，\"在想，我们到底能走多远。\"</p>\n<p>\"一定会走得很远。\"苏星陨说，\"因为你不是一个人在战斗。\"</p>\n<p>\"你有我，有林珩，有陆沉，有塔克，有……所有相信你的人。\"</p>\n<p>楚锐沉默了片刻，然后问道：\"星陨，如果有一天，我变成了另一个人，一个……不再是我的存在，你会怎么办？\"</p>\n<p>苏星陨深紫色的眼眸中闪过一丝痛楚，但她很快就坚定了下来。</p>\n<p>\"我会找到你。\"她说，\"无论你在哪里，无论你变成了什么样子，我都会找到你。\"</p>\n<p>\"然后，我会把你带回来。\"</p>\n<p>\"回到我身边，回到……人类身边。\"</p>\n<p>楚锐看着她，目光中多了一丝温柔。</p>\n<p>\"谢谢。\"他说。</p>\n<p>两人并肩站在地下城的边缘，看着远处微弱的灯光，久久无言。</p>\n<p>在他们头顶一千米的地方，是满目疮痍的地面，是外星人的统治，是看似不可战胜的敌人。</p>\n<p>但在他们脚下，在这片黑暗的地下，希望的种子正在发芽。</p>\n<p>星星之火，已经点燃。</p>\n<p>只待风起，便可燎原。</p>\n<p><strong>第一卷：废土星火 · 完</strong></p>\n<hr>\n<p><strong>【下卷预告】</strong></p>\n<p>《星际猎场》第二卷：《星际远征》</p>\n<p>楚锐将带领星火反抗军，从地下走向地面，从地球走向星空。</p>\n<p>月球战役、火星攻防、小行星带伏击……</p>\n<p>人类的旗帜，将在太阳系中飘扬。</p>\n<p>而那些曾经高高在上的存在，将第一次感受到……</p>\n<p>来自虫子的恐惧。</p>\n<p><strong>敬请期待。</strong></p>"}];
        
        let currentChapter = 0;
        let isSidebarOpen = true;
        let fontSize = 18;
        
        // 初始化
        function init() {
            if (chaptersData.length === 0) {
                document.getElementById('chapter-content').innerHTML = '<p style="text-align: center; padding-top: 100px; color: #999;">暂无章节数据</p>';
                return;
            }
            
            renderChapterList();
            document.getElementById('total-chapters').textContent = chaptersData.length + '章';
            document.getElementById('total-chapter-count').textContent = '共' + chaptersData.length + '章';
            
            // 加载上次阅读的章节
            const saved = localStorage.getItem('last-chapter');
            if (saved) {
                loadChapter(parseInt(saved));
            } else {
                loadChapter(1);
            }
        }
        
        function renderChapterList() {
            const list = document.getElementById('chapter-list');
            list.innerHTML = '';
            
            chaptersData.forEach(ch => {
                const li = document.createElement('li');
                li.className = 'chapter-item' + (ch.num === currentChapter ? ' active' : '');
                li.onclick = () => loadChapter(ch.num);
                li.innerHTML = `
                    <span class="chapter-num">第${ch.num}章</span>
                    <span class="chapter-title">${ch.title}</span>
                `;
                list.appendChild(li);
            });
        }
        
        function loadChapter(num) {
            if (num < 1 || num > chaptersData.length) return;
            
            currentChapter = num;
            const chapter = chaptersData.find(c => c.num === num);
            
            if (!chapter) return;
            
            // 更新UI
            document.getElementById('current-title').textContent = chapter.title;
            document.getElementById('current-chapter-num').textContent = '第' + num + '章';
            document.getElementById('chapter-content').innerHTML = chapter.content;
            document.getElementById('chapter-content').scrollTop = 0;
            
            // 更新导航按钮
            document.getElementById('btn-prev').disabled = num <= 1;
            document.getElementById('btn-next').disabled = num >= chaptersData.length;
            
            // 更新列表高亮
            renderChapterList();
            
            // 保存进度
            localStorage.setItem('last-chapter', num);
        }
        
        function prevChapter() { loadChapter(currentChapter - 1); }
        function nextChapter() { loadChapter(currentChapter + 1); }
        
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            isSidebarOpen = !isSidebarOpen;
            sidebar.classList.toggle('hidden', !isSidebarOpen);
        }
        
        function adjustFontSize(delta) {
            fontSize += delta;
            fontSize = Math.max(14, Math.min(24, fontSize));
            document.documentElement.style.setProperty('--font-size', fontSize + 'px');
            localStorage.setItem('font-size', fontSize);
        }
        
        function toggleTheme() {
            const themes = ['light', 'dark', 'sepia'];
            const current = document.body.getAttribute('data-theme') || 'light';
            const next = themes[(themes.indexOf(current) + 1) % themes.length];
            document.body.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }
        
        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') prevChapter();
            if (e.key === 'ArrowRight') nextChapter();
            if (e.key === 'Escape') toggleSidebar();
        });
        
        // 加载设置
        const savedFontSize = localStorage.getItem('font-size');
        if (savedFontSize) {
            fontSize = parseInt(savedFontSize);
            document.documentElement.style.setProperty('--font-size', fontSize + 'px');
        }
        
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.body.setAttribute('data-theme', savedTheme);
        }
        
        // 启动
        init();
    </script>
</body>
</html>
