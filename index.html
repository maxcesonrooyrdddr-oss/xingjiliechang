<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星际猎场 - 小说阅读器 (在线版)</title>
    <style>
        :root {
            --bg-color: #f5f5f5; --text-color: #333; --sidebar-bg: #fff;
            --header-bg: #fff; --border-color: #e0e0e0; --accent-color: #1a73e8;
            --hover-bg: #f0f0f0; --font-size: 18px; --line-height: 1.8;
            --danger-color: #d32f2f; --success-color: #388e3c;
        }
        [data-theme="dark"] { --bg-color: #1a1a1a; --text-color: #e0e0e0; --sidebar-bg: #2d2d2d; --header-bg: #2d2d2d; --border-color: #444; --hover-bg: #3d3d3d; }
        [data-theme="sepia"] { --bg-color: #f4ecd8; --text-color: #5b4636; --sidebar-bg: #e8dcc0; --header-bg: #e8dcc0; --border-color: #d4c4a8; --hover-bg: #ddd0b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg-color); color: var(--text-color); line-height: var(--line-height); overflow: hidden; }
        #app { display: flex; height: 100vh; }
        .sidebar { width: 380px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background: linear-gradient(135deg, var(--accent-color), #4285f4); color: white; }
        .sidebar-header h1 { font-size: 1.4em; margin-bottom: 10px; }
        .chapter-list-container { flex: 1; overflow-y: auto; padding: 10px; }
        .volume-item { margin-bottom: 8px; border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; }
        .volume-header { padding: 12px 15px; background: var(--hover-bg); cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 500; }
        .chapter-list { display: none; padding: 5px; }
        .chapter-list.expanded { display: block; }
        .chapter-item { padding: 10px 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-radius: 4px; margin-bottom: 3px; }
        .chapter-item:hover { background: var(--hover-bg); }
        .chapter-item.active { background: var(--accent-color); color: white; }
        .chapter-actions { display: none; gap: 5px; }
        .chapter-item:hover .chapter-actions { display: flex; }
        .action-btn { padding: 3px 8px; font-size: 0.75em; border: none; border-radius: 3px; cursor: pointer; }
        .edit-btn { background: white; color: var(--accent-color); }
        .delete-btn { background: white; color: var(--danger-color); }
        .add-chapter-btn { padding: 8px; margin: 10px; background: var(--success-color); color: white; border: none; border-radius: 4px; cursor: pointer; width: calc(100% - 20px); }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 15px 25px; background: var(--header-bg); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .content { flex: 1; padding: 30px; overflow-y: auto; font-size: var(--font-size); }
        .read-mode, .edit-mode { display: none; }
        .read-mode.active, .edit-mode.active { display: block; }
        .chapter-title-display { font-size: 1.6em; font-weight: bold; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid var(--accent-color); }
        .chapter-content { white-space: pre-wrap; line-height: 2; }
        .chapter-content p { margin-bottom: 1.2em; text-indent: 2em; }
        .edit-textarea { width: 100%; height: calc(100vh - 200px); padding: 20px; font-size: var(--font-size); line-height: 1.8; border: 1px solid var(--border-color); border-radius: 5px; resize: none; font-family: inherit; }
        .edit-actions { display: flex; gap: 10px; padding: 15px; background: var(--header-bg); border-top: 1px solid var(--border-color); }
        .control-btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 0.95em; }
        .save-btn { background: var(--success-color); color: white; }
        .cancel-btn { background: #666; color: white; }
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #999; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 2px solid #f3f3f3; border-top: 2px solid var(--accent-color); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status-bar { padding: 8px 15px; background: var(--hover-bg); border-top: 1px solid var(--border-color); font-size: 0.85em; color: #666; display: flex; justify-content: space-between; }
        .toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; background: #333; color: white; border-radius: 4px; display: none; }
        .toast.show { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="app">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>📚 星际猎场</h1>
                <div style="font-size: 0.85em; opacity: 0.9;">在线数据库版</div>
            </div>
            <button class="add-chapter-btn" onclick="showCreateForm()">+ 新建章节</button>
            <div class="chapter-list-container" id="chapterList">
                <div class="loading"></div>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div id="breadcrumb">请选择章节</div>
                <div>
                    <button class="control-btn" onclick="changeFontSize(-2)">A-</button>
                    <button class="control-btn" onclick="changeFontSize(2)">A+</button>
                    <button class="control-btn" onclick="setTheme('light')">☀️</button>
                    <button class="control-btn" onclick="setTheme('dark')">🌙</button>
                </div>
            </header>

            <div class="content read-mode active" id="readMode">
                <div class="empty-state" id="emptyState">
                    <div style="font-size: 4em; margin-bottom: 20px;">📖</div>
                    <p>请选择左侧章节开始阅读</p>
                    <p style="font-size: 0.85em; margin-top: 10px;">所有修改将自动保存到云端数据库</p>
                </div>
                <div id="chapterDisplay" style="display: none;">
                    <div class="chapter-title-display" id="chapterTitle"></div>
                    <div class="chapter-content" id="chapterBody"></div>
                </div>
            </div>

            <div class="content edit-mode" id="editMode">
                <input type="text" id="editTitle" placeholder="章节标题" style="width: 100%; padding: 10px; margin-bottom: 10px; font-size: 1.1em; border: 1px solid var(--border-color); border-radius: 4px;">
                <textarea class="edit-textarea" id="editContent" placeholder="在此输入章节内容..."></textarea>
                <div class="edit-actions">
                    <button class="control-btn save-btn" onclick="saveChapter()">💾 保存到数据库</button>
                    <button class="control-btn cancel-btn" onclick="cancelEdit()">❌ 取消</button>
                    <span id="wordCount" style="margin-left: auto; color: #666;">0 字</span>
                </div>
            </div>

            <div class="status-bar">
                <span id="statusText">就绪</span>
                <span id="chapterInfo"></span>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <!-- 新建章节弹窗 -->
    <div id="createModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: white; padding: 30px; border-radius: 8px; width: 400px;">
            <h3 style="margin-bottom: 20px;">新建章节</h3>
            <select id="newVolumeId" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px;">
                <option value="1">第一卷：灾变废土</option>
                <option value="2">第二卷：引擎觉醒</option>
                <option value="3">第三卷：废土猎人</option>
                <option value="4">第四卷：降临派战争</option>
                <option value="5">第五卷：废土神战</option>
            </select>
            <input type="text" id="newChapterNum" placeholder="章节编号 (如: 1-1, 1-2)" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px;">
            <input type="text" id="newChapterTitle" placeholder="章节标题" style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 4px;">
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button onclick="closeCreateForm()" style="padding: 8px 16px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 4px;">取消</button>
                <button onclick="createChapter()" style="padding: 8px 16px; border: none; background: var(--accent-color); color: white; cursor: pointer; border-radius: 4px;">创建</button>
            </div>
        </div>
    </div>

    <script>
        // API配置 - 部署后需要修改为实际API地址
        const API_BASE = window.location.hostname === 'localhost' 
            ? 'http://localhost:3000/api' 
            : 'https://xingjiliechang.vercel.app/api';

        let currentChapter = null;
        let volumesData = [];

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadChapters();
            setupWordCount();
        });

        // 加载章节列表
        async function loadChapters() {
            try {
                updateStatus('加载中...');
                const response = await fetch(`${API_BASE}/chapters`);
                const data = await response.json();
                volumesData = data.volumes || [];
                renderChapterList();
                updateStatus('就绪');
            } catch (error) {
                console.error('加载失败:', error);
                updateStatus('加载失败: ' + error.message);
                showToast('连接数据库失败，请检查网络');
            }
        }

        // 渲染章节列表
        function renderChapterList() {
            const container = document.getElementById('chapterList');
            
            if (volumesData.length === 0) {
                container.innerHTML = '<div style="padding: 20px; text-align: center; color: #999;">暂无章节，点击上方按钮创建</div>';
                return;
            }

            container.innerHTML = volumesData.map(vol => `
                <div class="volume-item">
                    <div class="volume-header" onclick="toggleVolume(${vol.id})">
                        <span>${vol.title}</span>
                        <span>▶</span>
                    </div>
                    <div class="chapter-list" id="volume-${vol.id}">
                        ${vol.chapters.map(ch => `
                            <div class="chapter-item" data-id="${ch.id}" onclick="readChapter('${ch.id}')">
                                <span>${ch.num} ${ch.title}</span>
                                <div class="chapter-actions" onclick="event.stopPropagation()">
                                    <button class="action-btn edit-btn" onclick="editChapter('${ch.id}')">编辑</button>
                                    <button class="action-btn delete-btn" onclick="deleteChapter('${ch.id}', '${ch.title}')">删除</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        // 切换卷展开
        function toggleVolume(volumeId) {
            const list = document.getElementById(`volume-${volumeId}`);
            list.classList.toggle('expanded');
        }

        // 阅读章节
        async function readChapter(chapterId) {
            try {
                updateStatus('加载章节内容...');
                const response = await fetch(`${API_BASE}/chapters/${chapterId}`);
                const chapter = await response.json();
                
                currentChapter = chapter;
                
                document.getElementById('emptyState').style.display = 'none';
                document.getElementById('chapterDisplay').style.display = 'block';
                document.getElementById('chapterTitle').textContent = `${chapter.chapterNum} ${chapter.title}`;
                document.getElementById('chapterBody').innerHTML = renderMarkdown(chapter.content);
                document.getElementById('breadcrumb').textContent = `${getVolumeTitle(chapter.volumeId)} / ${chapter.title}`;
                document.getElementById('chapterInfo').textContent = `${chapter.wordCount || 0} 字 | 最后更新: ${new Date(chapter.updatedAt).toLocaleString()}`;
                
                // 高亮当前章节
                document.querySelectorAll('.chapter-item').forEach(item => item.classList.remove('active'));
                document.querySelector(`[data-id="${chapterId}"]`)?.classList.add('active');
                
                updateStatus('就绪');
            } catch (error) {
                showToast('加载章节失败: ' + error.message);
            }
        }

        // 编辑章节
        async function editChapter(chapterId) {
            try {
                const response = await fetch(`${API_BASE}/chapters/${chapterId}`);
                const chapter = await response.json();
                
                currentChapter = chapter;
                
                document.getElementById('editTitle').value = chapter.title;
                document.getElementById('editContent').value = chapter.content || '';
                document.getElementById('readMode').classList.remove('active');
                document.getElementById('editMode').classList.add('active');
                document.getElementById('breadcrumb').textContent = `编辑: ${chapter.title}`;
                updateWordCount();
            } catch (error) {
                showToast('加载失败: ' + error.message);
            }
        }

        // 保存章节
        async function saveChapter() {
            if (!currentChapter) return;
            
            const title = document.getElementById('editTitle').value;
            const content = document.getElementById('editContent').value;
            
            if (!title) {
                showToast('请输入章节标题');
                return;
            }
            
            try {
                updateStatus('保存中...');
                const response = await fetch(`${API_BASE}/chapters/${currentChapter.id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, content })
                });
                
                if (!response.ok) throw new Error('保存失败');
                
                showToast('✅ 已保存到数据库');
                cancelEdit();
                loadChapters(); // 刷新列表
                
                // 如果当前在阅读模式，刷新内容
                if (document.getElementById('chapterDisplay').style.display !== 'none') {
                    readChapter(currentChapter.id);
                }
            } catch (error) {
                showToast('保存失败: ' + error.message);
                updateStatus('保存失败');
            }
        }

        // 删除章节
        async function deleteChapter(chapterId, title) {
            if (!confirm(`确定要删除 "${title}" 吗？此操作不可恢复。`)) return;
            
            try {
                const response = await fetch(`${API_BASE}/chapters/${chapterId}`, {
                    method: 'DELETE'
                });
                
                if (!response.ok) throw new Error('删除失败');
                
                showToast('已删除');
                loadChapters();
                
                // 如果删除的是当前阅读的章节，回到空白页
                if (currentChapter && currentChapter.id === chapterId) {
                    document.getElementById('chapterDisplay').style.display = 'none';
                    document.getElementById('emptyState').style.display = 'flex';
                    currentChapter = null;
                }
            } catch (error) {
                showToast('删除失败: ' + error.message);
            }
        }

        // 创建新章节
        async function createChapter() {
            const volumeId = document.getElementById('newVolumeId').value;
            const chapterNum = document.getElementById('newChapterNum').value;
            const title = document.getElementById('newChapterTitle').value;
            
            if (!chapterNum || !title) {
                showToast('请填写完整信息');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/chapters`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ volumeId, chapterNum, title, content: '' })
                });
                
                if (!response.ok) throw new Error('创建失败');
                
                const result = await response.json();
                showToast('章节创建成功');
                closeCreateForm();
                loadChapters();
                
                // 自动进入编辑模式
                editChapter(result.id);
            } catch (error) {
                showToast('创建失败: ' + error.message);
            }
        }

        // 取消编辑
        function cancelEdit() {
            document.getElementById('editMode').classList.remove('active');
            document.getElementById('readMode').classList.add('active');
            
            if (currentChapter) {
                document.getElementById('breadcrumb').textContent = `${getVolumeTitle(currentChapter.volumeId)} / ${currentChapter.title}`;
            } else {
                document.getElementById('breadcrumb').textContent = '请选择章节';
            }
        }

        // 显示/关闭创建弹窗
        function showCreateForm() {
            document.getElementById('createModal').style.display = 'flex';
        }
        function closeCreateForm() {
            document.getElementById('createModal').style.display = 'none';
            document.getElementById('newChapterNum').value = '';
            document.getElementById('newChapterTitle').value = '';
        }

        // 字数统计
        function setupWordCount() {
            document.getElementById('editContent').addEventListener('input', updateWordCount);
        }
        function updateWordCount() {
            const content = document.getElementById('editContent').value;
            document.getElementById('wordCount').textContent = `${content.length} 字`;
        }

        // Markdown渲染
        function renderMarkdown(text) {
            if (!text) return '<p style="color: #999;">暂无内容</p>';
            return text
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/\*\*(.*)\*\*/gim, '<strong>$1</strong>')
                .replace(/\n/gim, '</p><p>');
        }

        // 辅助函数
        function getVolumeTitle(id) {
            const titles = { 1: '第一卷', 2: '第二卷', 3: '第三卷', 4: '第四卷', 5: '第五卷' };
            return titles[id] || `第${id}卷`;
        }
        function updateStatus(text) {
            document.getElementById('statusText').textContent = text;
        }
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        }
        function changeFontSize(delta) {
            const root = document.documentElement;
            const current = parseInt(getComputedStyle(root).getPropertyValue('--font-size'));
            root.style.setProperty('--font-size', Math.max(14, Math.min(24, current + delta)) + 'px');
        }

        // 加载保存的主题
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) setTheme(savedTheme);
    </script>
</body>
</html>
